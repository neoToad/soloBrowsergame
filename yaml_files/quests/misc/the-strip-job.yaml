- key: the-strip-job__burned
  scene_type: ending
  title: Burned
  order: 100
  body: 'You come to outside. Someone dragged you out, which means someone didn''t
    want the police called, which tells you something about who owns the store that
    you would have preferred to know going in. No cash. No ledger. The side of your
    face is making an argument you don''t have a response to.


    Two blocks away you stop and check your pockets out of habit. Empty. The Strip
    keeps moving around you, indifferent, unhurried, completely unimpressed.

    '
