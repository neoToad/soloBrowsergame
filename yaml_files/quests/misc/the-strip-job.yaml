- key: the-strip-job__done
  scene_type: ending
  title: Done
  order: 90
  body: 'Clean. The Strip swallows you up the way you knew it would. The cash is real,
    the ledger is in your jacket, and nobody got a good look at anything. The car
    outside turned out to be nothing, or if it wasn''t nothing it wasn''t fast enough.


    You don''t know yet what''s in the ledger. That''s tomorrow''s question.

