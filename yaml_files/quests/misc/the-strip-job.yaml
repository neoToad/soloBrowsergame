- key: the-strip-job__the-back-room
  scene_type: normal
  title: The Back Room
  order: 70
  body: "Small room. Shelving units, a safe that's open and mostly empty, and a lockbox\
    \ on the desk that isn't. You crack it \u2014 cash, and underneath the cash a\
    \ ledger. Handwritten, two years of names and numbers. You recognize two of them\
    \ and wish you didn't.\n\nThen you hear breathing. There's someone in the corner\
    \ behind the shelving unit. Young, maybe seventeen, sitting on an upturned crate\
    \ with his knees pulled up. He looks at you. You look at him. He was clearly not\
    \ supposed to be here either.\n"
