- key: the-strip-job__complications
  scene_type: ending
  title: Complications
  order: 95
  body: "You walk out the front and the car clocks you. Not immediately \u2014 there's\
    \ a delay, like they're confirming something, which means the kid made his call\
    \ faster than you expected. You're half a block away before the doors open. You\
    \ don't run. Running is worse. You take three turns and duck into the dry cleaner's\
    \ doorway \u2014 closed for renovation, fourteen months now \u2014 and wait, and\
    \ after four minutes nothing comes past, and you walk the rest of the way in the\
    \ direction that isn't your actual direction.\n\nYou've got the cash. You've got\
    \ the ledger. But someone got a look at you, and someone in that car is going\
    \ to describe what they saw to whoever owns that store.\n"
