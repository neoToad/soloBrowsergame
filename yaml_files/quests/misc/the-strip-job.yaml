- key: the-strip-job__the-corner
  scene_type: normal
  title: The Corner
  order: 10
  body: "There's an electronics shop two blocks down from where you're standing. You've\
    \ walked past it three times this week without meaning to. Small place, independent,\
    \ the kind that sells phone cases and cheap cables and doesn't ask questions.\
    \ The till is visible from the street. So is the back room door, which is never\
    \ fully closed. Tonight the Strip is doing what it does \u2014 high foot traffic,\
    \ nobody watching anything. You could move now. Or you could watch it a little\
    \ longer.\n"
