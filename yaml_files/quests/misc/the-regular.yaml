- key: the-regular__the-choice
  scene_type: normal
  title: The Choice
  order: 90
  body: 'Danny opens the door without the chain this time. You tell him the two guys
    won''t be coming back. He nods slowly, like he was hoping for something he knew
    was too much to ask. Then he asks what it cost you. You think about the three
    hundred dollars and the conversation and whatever comes next for whoever owns
    that debt. Two options present themselves.

    '
