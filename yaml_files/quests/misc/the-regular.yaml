- key: the-regular__scared-off
  scene_type: ending
  title: Scared Off
  order: 105
  body: 'You tell him the two guys are gone but the debt is still out there somewhere,
    and whoever owns it will eventually pass it to someone new. He should lie low,
    vary his routine, not open the door to strangers. He nods. He says he understands.
    He''s been doing that for two weeks already. You go back to Corky''s. You don''t
    tell Sal the details. He doesn''t ask. He pours you one on the house, which he''s
    never done before, and goes back to his glasses.

    '
