- key: the-regular__the-negotiation
  scene_type: normal
  title: The Negotiation
  order: 60
  body: 'You explain the situation. Danny didn''t run up this debt, his dead friend
    did, and the friend is no longer available to collect from. You suggest that passing
    this particular problem back up the chain is probably worth more to everyone than
    three hundred dollars from a retired machinist in a cardigan. You keep it reasonable.
    You keep it calm. The taller one is listening. The shorter one is still not moving.

    '
