- key: the-regular__beaten
  scene_type: ending
  title: Beaten
  order: 110
  body: 'You wake up on the block. They''re gone. Nothing broken that won''t heal,
    nothing taken except the evening. You go back to Crane Street anyway. Danny answers
    on the first knock this time. He looks at you and then he looks past you and he
    says quietly that he appreciates it but he doesn''t want anyone else coming around.
    He says it like he means it. He closes the door. You go back to Corky''s and sit
    at the bar and don''t say anything and Sal doesn''t ask.

    '
