- key: the-regular__the-debt
  scene_type: normal
  title: The Debt
  order: 40
  body: 'He stands in the doorway and tells you in the flat voice of someone who has
    been rehearsing this: it''s three hundred dollars, it belonged to a friend of
    his who died eight months ago, somehow it became his problem, two guys have come
    by twice now and the second time they broke something in the hallway. He says
    he''s handling it. He is clearly not handling it. He says he doesn''t want any
    trouble. You tell him you''re not trouble. He looks at you for a long moment,
    like he''s deciding whether that''s ever been true of anyone who''s said it.

    '
