- key: the-regular__done
  scene_type: ending
  title: Done
  order: 100
  body: 'You pull the cash out. He looks at it for a long moment and then he looks
    at you and says he doesn''t understand why a stranger would do that. You tell
    him Sal''s been wiping down the same glasses for eleven years waiting for him
    to come back in on Tuesday. You''re not sure if that''s the real reason. It''ll
    do. He takes the cash. He says he''ll be in Thursday. You go back to Corky''s
    and tell Sal. Sal picks up his cloth.

    '
