- key: the-regular__the-corner
  scene_type: normal
  title: The Corner
  order: 50
  body: "It doesn't take long. Two corner boys, working the block two streets over.\
    \ Young \u2014 early twenties at most. They're not Kings, not BSB, just muscle\
    \ hired to follow up on a debt that got sold down the chain until it landed with\
    \ someone who needed the three hundred more than they needed the hassle. They\
    \ clock you coming. The taller one crosses his arms. The shorter one doesn't move\
    \ at all, which is worse.\n"
