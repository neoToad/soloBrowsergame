- key: the-regular__crane-street
  scene_type: normal
  title: Crane Street
  order: 30
  body: "Six-story walkup. Danny's on the fourth floor. You knock. Long pause. Then\
    \ the chain goes on before the door opens \u2014 just a crack, just enough. Danny\
    \ is mid-sixties, smaller than you expected, wearing a cardigan that's seen better\
    \ decades. He looks at you the way people look at strangers at their door when\
    \ they're already scared of something else. You tell him Sal sent you. The chain\
    \ stays on. He says he's fine. He says tell Sal he's fine. Behind him you can\
    \ see a window with the curtain drawn in the middle of the afternoon.\n"
