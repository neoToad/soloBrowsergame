- key: the-regular__sal-mentions-it
  scene_type: normal
  title: Sal Mentions It
  order: 10
  body: "Sal's wiping down the bar when he says it. Not to you specifically \u2014\
    \ just out loud, the way he says things. Danny Kowalski hasn't been in for two\
    \ weeks. Tuesday, Thursday, every week for eleven years, and then nothing. Sal\
    \ sets the cloth down and picks up a glass and doesn't say anything else. He's\
    \ not asking you to do anything. He's just saying it. You finish your drink and\
    \ think about it for longer than you probably should.\n"
