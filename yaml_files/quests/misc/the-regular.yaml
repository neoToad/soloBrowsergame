quest:
  key: the-regular
  title: The Regular
  description: 'Danny Kowalski hasn''t been in for two weeks. Tuesday, Thursday, every
    week for eleven years, and then nothing. Sal''s not asking you to do anything
    about it. He''s just saying it.

    '
  arc: null
  arc_order: 0
  is_repeatable: false
