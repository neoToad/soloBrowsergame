- key: the-regular__what-sal-knows
  scene_type: normal
  title: What Sal Knows
  order: 20
  body: 'Not much. Danny''s a retired machinist. Lives six blocks away on Crane Street.
    Drinks a pint of bitter and nurses a second one for two hours and tips exactly
    fifteen percent every time, which Sal finds both endearing and faintly insulting.
    No family that Sal knows about. Couple of friends who used to come in with him
    but stopped a few years back. Sal doesn''t know why. He writes Danny''s address
    on a bar napkin without being asked and slides it across the bar. Then he picks
    up his cloth and goes back to the glasses.

    '
