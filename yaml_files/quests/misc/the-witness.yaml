quest:
  key: the-witness
  title: The Witness
  description: 'A Kings soldier named Calvin has been missing for four days. His crew
    thinks he''s being leaned on. They want someone outside the Kings to find him
    before it becomes a loyalty question.

    '
  arc: null
  arc_order: 0
