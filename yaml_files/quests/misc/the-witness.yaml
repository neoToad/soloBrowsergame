    \ not just Fridays, and the cousin isn't hard to find if you know where card games\
    \ happen in this part of the Westside. You ask around carefully \u2014 not Calvin's\
    \ name, just the shape of someone who needs a quiet place for a few days and has\
    \ family who might provide it.\n"
