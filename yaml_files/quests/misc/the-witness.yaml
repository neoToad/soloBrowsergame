- key: the-witness__council
  scene_type: ending
  title: Council
  order: 90
  body: "You bypass Deon and go straight to the council through the contact who gave\
    \ you the job. It takes two hours and a waiting room and Ray Okafor asking you\
    \ specific practical questions for twenty minutes. Then Curt says something short\
    \ that everyone finishes what they're doing to hear. Calvin goes back to the crew.\
    \ The corner boy's situation is resolved at a level above your pay grade, quickly\
    \ and without announcement. You get paid twice \u2014 once for finding Calvin,\
    \ once for what you brought back with him.\n"
