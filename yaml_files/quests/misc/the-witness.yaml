- key: the-witness__sitting-on-it
  scene_type: ending
  title: Sitting On It
  order: 95
  body: "Calvin goes back with nothing. You keep what you know. Three days later the\
    \ corner boy is gone \u2014 not the way the council would have done it, quietly,\
    \ but visibly, messily, in a way that costs the Kings two blocks of credibility\
    \ on the Flats border. Someone else connected the same dots you did and moved\
    \ faster. The information you were sitting on is now just history. Deon doesn't\
    \ blame you. He doesn't know you had it. That's almost worse.\n"
