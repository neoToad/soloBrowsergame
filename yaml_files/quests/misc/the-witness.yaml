scenes:
- key: the-witness__the-approach
  scene_type: normal
  title: The Approach
  order: 10
  body: "A Kings soldier named Deon finds you at the corner. Not aggressive \u2014\
    \ careful. He says a guy from his crew named Calvin has been gone for four days.\
    \ Not unusual for Calvin to go quiet but four days is different and the crew is\
    \ starting to ask questions Deon doesn't know how to answer. He says Calvin was\
    \ on Crane Street last Tuesday night \u2014 the block with the lockup \u2014 and\
    \ came back different. Wouldn't say what he saw. Went quiet the next day and hasn't\
    \ surfaced since. Deon says the crew thinks he's being leaned on by someone. He\
    \ says he needs someone outside the Kings to find Calvin before the crew decides\
    \ it's a loyalty question. He looks at you when he says outside the Kings. You\
    \ understand what he means.\n"
