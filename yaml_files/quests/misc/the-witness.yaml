- key: the-witness__clean-return
  scene_type: ending
  title: Clean Return
  order: 80
  body: 'Calvin goes back. He tells the crew he needed a few days, personal reasons,
    nothing to do with the crew. Deon accepts it because accepting it is easier than
    not accepting it. The corner boy is still out there. The Bucco connection is still
    live. Nobody knows except you. That information is either an asset or a weight
    and right now you can''t tell which.

    '
