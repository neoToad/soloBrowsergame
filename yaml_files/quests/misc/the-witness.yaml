- key: the-witness__what-deon-knows
  scene_type: normal
  title: What Deon Knows
  order: 20
  body: "Not much more than he said. Calvin is twenty-two, been with the crew three\
    \ years, reliable until last Tuesday. He has a girlfriend on the north Westside\
    \ \u2014 Deon gives you her block \u2014 and a cousin who runs a card game on\
    \ Fridays out of a basement on Mercer Street. Deon says Calvin didn't go home\
    \ Tuesday night and hasn't called the girlfriend since. He says that part is new\
    \ \u2014 Calvin calls her every day, has done for two years. Deon says find him\
    \ before Friday because Friday is when people start drawing conclusions.\n"
