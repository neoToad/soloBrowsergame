- key: the-witness__the-favor-detail
  scene_type: normal
  title: The Favor Detail
  order: 40
  body: "She doesn't know what the favor was. But she remembers he mentioned a name\
    \ \u2014 not a crew name, just a first name, the corner boy who asked him to do\
    \ it. The name she gives you is the same name attached to a jacket on Crane Street\
    \ last Tuesday. The same freelancer. The same lockup. Calvin wasn't a witness\
    \ to something. Calvin was doing the run for the corner boy \u2014 one night,\
    \ cash in hand, favor returned. And something went wrong on Crane Street that\
    \ night that Calvin came back from and hasn't talked about since.\n"
