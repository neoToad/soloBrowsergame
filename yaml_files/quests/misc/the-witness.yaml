- key: the-witness__calvin
  scene_type: normal
  title: Calvin
  order: 60
  body: "Twenty-two. Sitting on an upturned crate in the dark. He looks at you the\
    \ way people look at someone when they've run out of places to go. He doesn't\
    \ ask how you found him. He just says he didn't know what was in the lockup. He\
    \ thought it was product, standard run, cash job. But when he got there the corner\
    \ boy wasn't moving product. He was meeting someone \u2014 older, suit, unhurried.\
    \ Calvin heard enough of the conversation to understand that the corner boy was\
    \ passing information about Kings operations to someone who wasn't Kings. He panicked\
    \ and left and hasn't known what to do with it since.\n"
