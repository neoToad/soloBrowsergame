- key: the-witness__deon-knows
  scene_type: ending
  title: Deon Knows
  order: 85
  body: 'Deon goes very still when you tell him. He asks you to say it again. Then
    he thanks you in the careful way of someone who is already thinking about what
    comes next and doesn''t want you to see it. Calvin goes back to the crew. What
    Deon does with the information is Deon''s business now. The council will know
    by morning. What happens to the corner boy after that is not something Deon says
    out loud.

    '
