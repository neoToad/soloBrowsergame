- key: the-witness__the-girlfriend
  scene_type: normal
  title: The Girlfriend
  order: 30
  body: "Her name is Aisha. She opens the door with her phone in her hand like she's\
    \ been waiting for a call. When she sees you're not Calvin she puts the phone\
    \ in her pocket and waits. You tell her Deon sent you. She says she doesn't know\
    \ where he is. You believe her. She says he called her Monday \u2014 the night\
    \ before Crane Street \u2014 and he sounded fine. Normal. Then nothing. She says\
    \ the last thing he said was that he had to do something Tuesday night, a favor\
    \ for someone on the crew, and he'd call her after. She says he didn't sound worried.\
    \ She pauses. She says he sounded like someone who hadn't decided yet whether\
    \ to be worried.\n"
