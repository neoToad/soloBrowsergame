- key: the-tail__the-call
  scene_type: normal
  title: The Call
  order: 10
  body: "Burner number. No name. The voice is calm in the way that people are calm\
    \ when they've already decided what they want and are just waiting for you to\
    \ agree. There's a woman named Carla who works out of the noodle place on the\
    \ corner. Someone's been watching her for three days \u2014 same car, same spot,\
    \ same camera. The caller wants to know who hired the watcher. Then they want\
    \ the watcher gone. They use that word specifically. Gone. You ask what it pays.\
    \ They tell you. You don't ask anything else.\n"
