- key: the-tail__burned
  scene_type: ending
  title: Burned
  order: 90
  body: 'You come to in the loading bay. The car is gone. His phone is gone. Your
    pockets are lighter than they were. Somewhere in the city a private investigator
    is explaining to his client that someone came asking, and the client is deciding
    what to do about that, and you don''t know who the client is or what they''re
    capable of. The noodle place is two blocks away. You don''t go. You don''t have
    anything to tell Carla.

    '
