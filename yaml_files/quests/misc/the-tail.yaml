- key: the-tail__messy-exit
  scene_type: ending
  title: Messy Exit
  order: 80
  body: 'You call the burner number from a payphone two blocks over. Read out the
    billing address. The caller says good and then says they heard it got complicated.
    You don''t ask how they heard. They say the payment stands but next time keep
    it cleaner. The line goes dead. You tell Carla in passing. She doesn''t look surprised,
    which means she already knew, which means she has sources you don''t know about.
    That''s interesting.

    '
