- key: the-tail__squeeze-success
  scene_type: normal
  title: Squeeze Success
  order: 45
  body: 'Nerve check passed. He talks in the clipped way of someone who has decided
    that cooperation is the least bad option available to him. A law firm on the Hill.
    Client privilege means he doesn''t know who specifically, just the billing address.
    He writes it on a card and hands it through the gap in the window. Then he asks
    what happens now.

    '
