- key: the-tail__the-watcher
  scene_type: normal
  title: The Watcher
  order: 30
  body: "The car is a grey sedan parked in the dry cleaner's loading bay \u2014 closed\
    \ for renovation, same as it's been for fourteen months. The watcher is inside\
    \ it. Late forties, jacket that was expensive once, a camera with a long lens\
    \ on the passenger seat. He sees you coming and doesn't move, which means he's\
    \ either very calm or he's already made a call. You tap on the window. He rolls\
    \ it down an inch. His eyes go to your hands first, then your face.\n"
