- key: the-tail__clean-exit
  scene_type: ending
  title: Clean Exit
  order: 70
  body: 'You call the burner number from three blocks away. Read out the billing address.
    The line is quiet for a moment and then the caller says good and hangs up. You
    stop at the noodle place on the way back and tell Carla. She writes something
    in her ledger and doesn''t say thank you, which is its own kind of thank you.
    The zip ties are still in your jacket pocket. You keep them.

    '
