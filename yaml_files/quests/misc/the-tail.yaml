- key: the-tail__find-carla
  scene_type: normal
  title: Find Carla
  order: 20
  body: 'The noodle place does a lunch special that runs out by noon. It''s quarter
    past and Carla''s at a table in the back with a ledger and a cup of tea she hasn''t
    touched. Mid-forties, reading glasses on a chain, the particular stillness of
    someone who has spent a long time not reacting to things. She clocks you the second
    you walk in. You tell her someone''s watching her. She says she knows. She''s
    been watching him watch her for two days and didn''t know what to do about it.
    She slides a napkin across the table with a license plate written on it. She says
    she wants to know who hired him too.

    '
