- key: the-tail__fight-victory
  scene_type: normal
  title: Fight Victory
  order: 65
  body: "He's on the ground by the rear wheel. You go through his jacket. A wallet,\
    \ a phone with three missed calls on the screen, and a folded invoice with a billing\
    \ address \u2014 a law firm on the Hill. Someone with money and a reason to watch\
    \ Carla. You take the invoice and the phone. He's breathing. Someone called before\
    \ you got here, which means someone knows this went wrong.\n"
