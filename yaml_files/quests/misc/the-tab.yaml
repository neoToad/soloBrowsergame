- key: the-tab__the-drive
  scene_type: normal
  title: The Drive
  order: 20
  body: 'You don''t have anything to open it on at the bar so you sit with it for
    a minute and think about what Sal said. Two people asking about the same man within
    two days of each other, neither of them identifying themselves, both of them asking
    carefully. That''s not a coincidence and it''s not a small thing. Fenn found something
    he wasn''t supposed to find and copied it onto a cheap flash drive and then left
    it on a table in Corky''s, which means either he panicked or he was interrupted
    or both. You need to find him before the other two do.

    '
