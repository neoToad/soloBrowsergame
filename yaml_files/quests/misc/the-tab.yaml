- key: the-tab__burned
  scene_type: ending
  title: Burned
  order: 80
  body: 'You break the drive and walk away and for two days it seems like that was
    the right call. Then a Blues unit comes into Corky''s and spends forty minutes
    asking Sal questions about a regular named Fenn who used the bar as a drop point
    for stolen financial records. Sal tells them nothing because he knows nothing,
    which is the one thing that went right. He calls you afterward and doesn''t say
    anything for a long moment. Then he says he needs a few days. You give him the
    few days. The bar is still there when they''re up. So is Sal. Things are different
    in a way neither of you names.

    '
