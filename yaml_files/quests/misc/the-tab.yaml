- key: the-tab__sal-tells-you
  scene_type: normal
  title: Sal Tells You
  order: 10
  body: "Sal puts the flash drive on the bar between you like he's setting down a\
    \ coaster. Small thing. Cheap plastic, the kind you get in a pack of ten. He says\
    \ a guy came in last Tuesday, ran up forty dollars, said he'd be back to cover\
    \ it. Didn't come back. Left this behind on the table. Sal found it when he was\
    \ clearing up. He held onto it because that seemed like the right thing to do\
    \ and then two days later someone came in asking about the guy \u2014 plainclothes,\
    \ didn't identify himself, but Sal's seen enough plainclothes to know plainclothes.\
    \ And then yesterday someone else came in. Older, suit, asked the same questions\
    \ differently. Sal says he told both of them nothing because he didn't know anything.\
    \ He picks up his cloth. He says the guy's name was Fenn.\n"
