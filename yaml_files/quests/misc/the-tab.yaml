- key: the-tab__clean
  scene_type: ending
  title: Clean
  order: 60
  body: 'Fenn is gone. The drive is in pieces on the laundromat floor. You go back
    to Corky''s and sit at the bar and Sal pours without asking. You tell him the
    guy won''t be coming back but his tab is settled and nobody needs to know anything
    else. Sal nods. He picks up his cloth. The two old men in the corner are still
    nursing their pints. The jukebox plays something from one era. Everything is exactly
    as it was, which is the point.

    '
