- key: the-tab__found-fenn
  scene_type: normal
  title: Found Fenn
  order: 35
  body: 'Cunning check passed. The laundromat. Back office, behind the industrial
    dryers, sitting on a folding chair with his jacket still on like he''s been ready
    to leave for three days. Fenn is mid-thirties, unremarkable, the kind of face
    that doesn''t stay in your memory. He looks at you and immediately starts explaining,
    which tells you he''s been rehearsing this conversation and just needed someone
    to have it with.

    '
