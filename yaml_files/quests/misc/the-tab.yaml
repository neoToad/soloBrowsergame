  scene_type: ending
  title: Evidence
  order: 65
  body: "The plainclothes officer takes the drive without thanking you. He asks how\
    \ you came to have it. You tell him you found it. He looks at you for a moment\
    \ with the particular expression of someone filing something away for later and\
    \ then he leaves. Three weeks later you hear that Corky's came up in a deposition\
    \ \u2014 not as a subject, just as a location. Sal reads about it in a filing\
    \ someone shows him. He doesn't say anything to you. He doesn't need to.\n"
