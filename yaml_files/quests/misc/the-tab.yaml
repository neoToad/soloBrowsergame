- key: the-tab__fenn-talks
  scene_type: normal
  title: Fenn Talks
  order: 40
  body: "He found the records by accident \u2014 he does occasional bookkeeping work,\
    \ legitimate, and a client handed him a folder that had something in it that shouldn't\
    \ have been there. Names, dates, amounts. Someone skimming from operations he\
    \ recognized immediately and wished he hadn't. He copied what he could onto the\
    \ drive before he understood what he was looking at. Then he understood what he\
    \ was looking at and he ran. He left the drive at Corky's because he panicked\
    \ and because he goes there sometimes and it felt like somewhere safe, which he\
    \ knows now was stupid. He says he just needs to get out of the city. He's not\
    \ asking for anything else.\n"
  roll:
