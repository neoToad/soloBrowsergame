    looking and you can''t change that. What you can change is what happens to the
    evidence. Hand it to the Blues and it becomes a case and Corky''s is in that story.
    Hand it to the Bucco associate and whoever they find first pays for all of it.
    Break it and nobody gets what they came for, which is the cleanest outcome available
    from a bad position.

    '
