- key: the-tab__find-fenn
  scene_type: normal
  title: Find Fenn
  order: 30
  body: "Fenn isn't crew, isn't connected, isn't the kind of person who has a usual\
    \ place to go to ground. What he has is a cousin who runs a laundromat off Decker\
    \ Avenue and a habit of staying somewhere familiar when things go wrong. You work\
    \ the thread carefully \u2014 not too many questions, not too fast, nothing that\
    \ gets back to the wrong person before you're ready.\n"
