- key: the-tab__the-decision
  scene_type: normal
  title: The Decision
  order: 50
  body: 'Three options. The drive goes to the plainclothes officer and becomes evidence
    and Fenn becomes a witness and the Buccos work out where it came from eventually
    and Corky''s is in that story. Or the drive goes to the Bucco associate and Fenn
    doesn''t get out of the city and you get paid and you know what you paid for.
    Or you tell Fenn to go, you break the drive, and neither of the two people asking
    gets what they came for. The last option doesn''t pay anything. It does mean you
    can look Sal in the eye tomorrow.

    '
