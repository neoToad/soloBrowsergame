  order: 70
  body: 'The associate takes the drive and hands you an envelope without counting
    out what''s in it, which means it''s enough that counting would be insulting.
    He says the matter is handled. He says it the way people say things when they
    mean something specific by handled. You go back to Corky''s. You don''t ask about
    Fenn. You don''t hear about Fenn. That''s probably the answer.

    '
