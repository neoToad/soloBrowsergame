  title: Messy
  order: 85
  body: 'The contact pays you and then mentions, almost in passing, that they had
    a feeling it was Flats-connected. You don''t confirm it. You don''t deny it. He
    nods like you''ve said something useful anyway. The Kings now know the direction
    if not the name. That''s a shorter distance to Harlan Street than anyone needs
    right now. The cold war is a little colder.

    '
