- key: the-boundary__the-trail
  scene_type: normal
  title: The Trail
  order: 30
  body: "The runner leads you three blocks before he makes a pickup from a lockup\
    \ on Crane Street. You stay back and watch the handoff. The person making the\
    \ delivery is young, Flats-side, wearing a jacket you recognize \u2014 not the\
    \ person, the jacket. Dutch's people have a particular source for their outerwear\
    \ and it's specific enough to be a tell if you know what you're looking at. You're\
    \ not certain. You need to be certain before you do anything with this.\n"
