- key: the-boundary__the-confrontation-setup
  scene_type: normal
  title: The Confrontation Setup
  order: 40
  body: "You go back to the lockup the next evening. The corner boy is there \u2014\
    \ alone this time, counting something. He sees you and his hand moves toward his\
    \ jacket and then stops when he reads your expression. You're not Kings. You're\
    \ not Blues. He's trying to work out what you are and what that means for the\
    \ next thirty seconds.\n"
