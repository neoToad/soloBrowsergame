  scene_type: ending
  title: Done
  order: 80
  body: 'Clean. The corner goes quiet. Neither side has to acknowledge what happened
    or why. The cold war holds. The contact pays you in the parking structure off
    Decker and shakes your hand once, which is more than you expected. You don''t
    mention Harlan Street. You don''t mention Dutch. Some information is worth more
    sitting still than moving.

    '
