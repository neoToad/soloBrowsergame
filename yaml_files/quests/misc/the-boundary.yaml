- key: the-boundary__the-block
  scene_type: normal
  title: The Block
  order: 20
  body: "Two blocks west of the Kings' established edge. A corner that's been neutral\
    \ for years, the kind of neutral that holds because both sides agree it does.\
    \ Someone's been working it for three weeks \u2014 not loudly, not flagrantly,\
    \ just consistently. You watch it for an hour. The operation is small. One runner,\
    \ careful, knows the timing. You clock the pickup point and the runner's route\
    \ and you start working backward.\n"
