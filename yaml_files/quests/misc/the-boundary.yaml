  title: Negotiation Success
  order: 55
  body: 'Nerve check passed. He walks. Leaves the lockup, leaves the corner, doesn''t
    look back. You wait twenty minutes to be sure and then you go find the contact
    and tell him it''s done. You don''t tell him it was Harlan Street. You don''t
    tell him it was a freelancer. You just say it''s done and let him decide what
    that''s worth.

    '
