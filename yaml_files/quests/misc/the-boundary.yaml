- key: the-boundary__the-negotiation
  scene_type: normal
  title: The Negotiation
  order: 50
  body: 'You lay it out for him. He''s two blocks into Kings territory. The council
    knows. The only reason this hasn''t already become something bad is because they
    wanted it handled quietly, and quiet is still available to him if he walks away
    from this corner tonight and doesn''t come back. You tell him Dutch doesn''t know
    he''s here and suggest he think carefully about whether Dutch finding out would
    be better or worse than what''s currently on the table.

    '
