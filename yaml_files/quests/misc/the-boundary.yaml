- key: the-boundary__the-ask
  scene_type: normal
  title: The Ask
  order: 10
  body: 'The contact finds you at the corner, not the other way around. Kings-adjacent,
    mid-level, the kind of person who passes messages without being the message. He
    says it quietly and without preamble: someone''s been running product two blocks
    into Kings territory from the Flats side. Small enough that the council hasn''t
    moved on it officially. Big enough that the corner crews are counting and comparing.
    He says the council wants it stopped before it becomes something they have to
    respond to formally, because a formal response means a formal escalation and nobody
    wants that. He says they want someone outside the Kings to look at it. He says
    they''re asking you.

    '
