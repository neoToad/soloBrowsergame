- key: the-boundary__fight-victory
  scene_type: normal
  title: Fight Victory
  order: 75
  body: "He's down. The lockup is quiet. You go through what he left behind \u2014\
    \ enough to confirm the Harlan Street connection, nothing that names Dutch directly.\
    \ You take what's useful and leave the rest. Then you find the contact and tell\
    \ him the corner is clear. You don't say how. He doesn't ask. But the way he doesn't\
    \ ask tells you he already knows more than he let on, which means the Kings had\
    \ their own read on this and wanted to see what you'd do with it.\n"
