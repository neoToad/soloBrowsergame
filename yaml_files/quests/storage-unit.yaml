    title: Talking
    order: 40
    body: |
      You hold the key up like that settles it. Like keys always mean permission.

      "It’s handled," you say.

      He watches you the way people watch a trick they’ve already seen once.

      The radio in the office hits a chorus and drops back out again.

      He hasn’t moved.
