  - key: the-storage-job__inside
    scene_type: normal
    title: Inside
    order: 70
    body: |
      The unit smells like cardboard and something chemical underneath it that doesn't belong in cardboard.

      Boxes, mostly. Labeled in a handwriting that tried to be neat and gave up halfway through.

      One of them is already open.

      Inside: a stack of folded clothes, a pair of shoes still laced, and a plastic bag with a prescription bottle rattling inside.

      You shake it once. Painkillers. Not yours. They are now.

      There’s a small lockbox bolted to the back wall. Cheap job. Whoever set it up assumed privacy, not resistance.

      You try the key.

      It works.

      Inside the lockbox is nothing dramatic. No cash, no weapon, no ledger.

      Just paperwork. Lease agreement. Your name isn’t on it.

      It could be.

      The month’s already paid.

      Your phone buzzes while you’re still looking at the paperwork.

      Unknown number.

      You answer.

      "Hey," she says. "Weird question. Do you have a place I can keep something for like... not forever, but longer than a weekend?"

      You look around the unit.

      Boxes. Space. A lock that works.
