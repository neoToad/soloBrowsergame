  - key: the-storage-job__what-is-it
    scene_type: normal
    title: What Is It
    order: 20
    body: |
      He exhales through his nose like you’ve asked him to do math.

      "Things," he says. Then, after a second, like that wasn’t satisfying even to him:
      "Not my things anymore. That’s the whole point."

      He looks past you, not turning his head. Just eyes.

      "You ever get the feeling something’s decided it’s your problem?"

      He presses the key into your hand before you answer.

      "Unit’s paid for the month. After that, it’s yours or it’s nobody’s."
