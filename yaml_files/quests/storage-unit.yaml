scenes:

  - key: the-storage-job__corner
    scene_type: normal
    title: The Corner
    order: 10
    body: |
      The corner works the way corners like this always work — nobody making eye contact, everybody aware of everybody anyway. There's a bus stop that hasn't seen a bus in months and a man standing just outside it like he's waiting for one that only he knows about.

      He clocks you before you clock him. That matters to him. You can tell because he nods like he's just confirmed something.

      "You look like someone who can carry something without asking what it is," he says.

      He's holding a key on a plastic fob. Number stamped into it. Worn smooth like it's been handled too much for something that’s supposed to stay quiet.

      "Storage unit. Couple blocks. I don't go there anymore."

      He doesn't explain why. Doesn't seem like he plans to.
