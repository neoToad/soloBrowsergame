  - key: the-storage-job__done
    scene_type: ending
    title: Done
    order: 80
    body: |
      You close the unit and test the lock twice. It holds both times. That’s more reassurance than you expected to get today.

      The key sits heavier in your hand now that it means something.

      Inside, whatever that guy was running from is still in boxes, labeled like it could be organized into making sense.

      It won’t be.

      Your phone is quiet again.

      For now.
