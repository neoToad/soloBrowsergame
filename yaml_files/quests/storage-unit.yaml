  - key: the-storage-job__walk-over
    scene_type: normal
    title: Walk Over
    order: 30
    body: |
      The storage place is exactly where places like this always are — between a laundromat that still uses coins and a tire shop that looks like it might be closed but isn't.

      The office is empty. Light on, chair pushed back, radio playing something soft enough that it feels like an apology.

      Unit number matches the fob.

      The door's locked.

      From somewhere behind you, a voice:

      "That one’s not available."

      You turn. Guy in a security jacket that fits too well to be issued. He's holding a clipboard he hasn't written on.
