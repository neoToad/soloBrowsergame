quest:
  key: first-word
  title: First Word
  description: >
    Someone heard about your sister's situation. They want to know if
    you're looking for work. First job's simple — a debt collection.
    Guy named Pruitt. Six hundred dollars.
  arc: intro
  arc_order: 2
  is_repeatable: false
