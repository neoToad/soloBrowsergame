quest:
  key: the-fallout
  title: The Fallout
  description: >
    Roughing up Terrell didn't end it. It made it worse.
    Now your sister is being watched and someone wants
    a conversation.
  arc: null
  arc_order: 0
  is_repeatable: false
  hub_scenes: []
  entrance_scene: the-fallout__the-second-call
  requirements:
    - label: Must have completed the call
      logic: all
      conditions:
        - condition_type: quest_completed
          required_quest: sisters_trouble
          flag_name: null
          stat_name: null
          stat_value: null
          required_item: null
          required_ending_type: null
          required_contact: null

