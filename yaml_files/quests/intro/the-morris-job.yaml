  title: Hot Delivery
  order: 90
  body: "Package delivered. Morris's reply takes four minutes this time. Delivered.\
    \ Blues logged a person of interest on Decker carrying a package. You. Pause.\
    \ Dutch is aware. Another pause. A hundred and fifty.\n\nFifty less than agreed.\
    \ You don't argue. There's nobody to argue with \u2014 Morris has already hung\
    \ up.\n\nThe lockup has a switchblade on the shelf. You look at it. You don't\
    \ take it. That feels right.\n"
