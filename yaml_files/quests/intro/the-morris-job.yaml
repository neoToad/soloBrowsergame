- key: the-morris-job__the-fork
  scene_type: normal
  title: The Fork
  order: 30
  body: "Decker Avenue runs straight through the middle of the Flats. Fifteen-minute\
    \ walk, broad daylight, direct. You've done it a hundred times.\n\nYou're halfway\
    \ there when you spot the patrol car sitting at the intersection of Decker and\
    \ Fifth \u2014 Blues, two officers, nobody moving. They're not doing anything.\
    \ That's the thing about the Blues when they're sitting still: they're watching.\n\
    \nYou can go around. Through the back streets off Marsh Lane \u2014 longer, slower,\
    \ but out of sight. Or you can keep walking. You've got nothing on you they can\
    \ legally touch. Probably.\n"
  roll:
