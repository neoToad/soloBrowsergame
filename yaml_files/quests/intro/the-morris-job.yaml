- key: the-morris-job__crane-street
  scene_type: normal
  title: Crane Street
  order: 20
  body: 'Pete is behind the counter sorting whites from darks like a man who has been
    trying very hard not to think about something for three days. He''s mid-forties,
    soft around the middle, got a wedding ring and a look in his eyes that says he
    made one bad decision a long time ago and has been paying for it in small installments
    ever since.


    He sees you, checks the door behind you, and goes to the back without a word.
    Comes out with a sealed package the size of a shoebox wrapped in brown paper and
    hands it over the counter like it''s something he found and doesn''t want to keep
    finding.


    He says: don''t come back.


    You weren''t planning to.

    '
