- key: the-morris-job__clean-delivery
  scene_type: ending
  title: Clean Delivery
  order: 80
  body: "The lockup smells like motor oil and old cardboard. Unit twelve has a combination\
    \ padlock with the code scratched into the doorframe in pencil, which is either\
    \ careless or confident. You set the package inside, lock up, and text the number\
    \ Morris gave you. Delivered.\n\nHe replies in forty seconds. Acceptable. Then:\
    \ Dutch knows your name. That's worth something. Then nothing.\n\nThere's a switchblade\
    \ on the shelf above where you set the package. No note. You take it \u2014 it\
    \ would be strange not to.\n\nTwo hundred cash arrives in the usual way, which\
    \ you have now figured out is the usual way.\n"
  roll:
