- key: the-morris-job__the-call
  scene_type: normal
  title: The Call
  order: 10
  body: "Morris calls at noon on the dot, which is when Morris calls. He doesn't introduce\
    \ himself \u2014 he says there's a package on Crane Street, a laundromat called\
    \ Presto's, ask for Pete. Deliver it to the lockup on Decker, unit twelve. Two\
    \ hundred on completion. He waits long enough to confirm you've heard him, then\
    \ hangs up.\n\nYou don't know what's in the package. That's the job.\n"
