    \ patrol noted someone on the back route near Marsh. Description matches. A pause.\
    \ A hundred and seventy-five.\n\nTwenty-five short. You did everything right except\
    \ the one thing. Morris doesn't explain the math \u2014 he doesn't need to. Dutch's\
    \ people are careful because Dutch is careful, and the back route is supposed\
    \ to be clean, and now there's a description floating around that matches yours.\n"
