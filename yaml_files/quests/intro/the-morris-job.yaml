- key: the-morris-job__back-streets
  scene_type: normal
  title: Back Streets
  order: 40
  body: "The back route adds ten minutes and takes you through a block of loading\
    \ docks and shuttered units that see more foot traffic after midnight than before\
    \ noon. Nobody's around. You keep the package close and your pace steady.\n\n\
    There's a moment \u2014 halfway through, crossing an open lot \u2014 where you\
    \ feel exposed in a way you can't account for. Like something is watching that\
    \ you can't see. You hold that feeling for about five seconds and then you keep\
    \ moving, because that's what you do with feelings like that.\n"
  roll:
    requires_roll: true
    roll_stat: intellect
    roll_difficulty: 11
