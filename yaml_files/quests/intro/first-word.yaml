      logic: all
      conditions:
        - condition_type: quest_completed
          required_quest: the-call
          flag_name: null
          stat_name: null
          stat_value: null
          required_item: null
          required_ending_type: null
          required_contact: null

scenes:

  - key: first-word__the-message
    scene_type: normal
    title: The Message
    order: 10
    body: >
      The message comes through a number you don't recognise. Three sentences,
      no name. Someone heard about Decker Avenue — not what happened, just that
      it ended.

      If you're looking for work, there's a collection job. Six hundred dollars.
      Meet at Dave's Bar, Flats, tomorrow at noon. Come alone.

      You don't know who sent it. You do know Dave's — long bar, bad lighting,
      the kind of place where the bartender remembers your drink and not your
      face.

      Six hundred is enough that someone thought about you before sending it.

