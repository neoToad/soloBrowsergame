  - key: first-word__pruitt-address
    scene_type: normal
    title: Pruitt's Address
    order: 30
    body: |
      The address is twelve minutes on foot, edging toward Westside blocks
      where the Kings care just enough to notice you if you give them a reason.

      The building leans a little. Front door propped open with something
      that used to be a shoe. Buzzers dead. Nobody fixes buzzers here.

      Fourth floor. 4C.

      Through the door: television noise. Daytime voices filling space.

      Pruitt's home.

      Six hundred dollars says he hasn't been answering the right calls.

