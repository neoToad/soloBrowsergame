  - key: first-word__daves-bar
    scene_type: normal
    title: Dave's Bar
    order: 20
    body: >
      Dave's Bar is half full at noon, which is more than you'd like.
      The man in the back booth has water in front of him. Untouched.

      "Morris," he says when you sit. Not an introduction. Just a label.

      He gets to it without checking if you're comfortable.

      Pruitt. Eight months late on a six hundred dollar loan. Standard terms,
      standard follow-up, except Dutch's regulars are busy and this doesn't
      justify them. You are, in his words, "appropriate for the scale."

      A hundred if you bring back the full amount. Fifty if you bring back
      something and a story that doesn't waste his time.

      He slides the address across the table. Flats. Fourth floor.

      "Dutch doesn't know your name," he adds. "This is how he would."

