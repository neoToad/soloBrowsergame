    title: Pruitt's Door
    order: 40
    body: |
      He opens the door on the chain first. Forty-something, underdressed
      for the time of day — the look of someone who's been expecting this
      and hoping it would be someone else.

      He opens it the rest of the way. Doesn't invite you in.

      The apartment is small and controlled. A kid's drawing on the fridge.
      Soccer ball in the corner.

      "I don't have it," he says. Rehearsed. Unconvincing.

