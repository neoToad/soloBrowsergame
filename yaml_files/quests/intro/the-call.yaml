- key: the-call__squeeze
  scene_type: normal
  title: Squeeze
  order: 50
  body: "You tell him you're there for the woman on the third floor. That whatever\
    \ she owes, she doesn't owe it anymore. You don't raise your voice. You don't\
    \ need to \u2014 the point isn't volume, it's clarity. You look at him the way\
    \ you look at something you've already decided about and let him work out the\
    \ rest himself.\n\nTerrell is listening. Behind the performance of not being impressed,\
    \ something is doing the math.\n"
