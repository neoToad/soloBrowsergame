      It goes loud and fast the way these things do, the way you remembered from before — adrenaline first, thinking second, the stoop light flickering overhead like it's nervous too. Terrell has reach and he's done this before but he commits too early and that's the whole fight right there.

      Somewhere above you a window slides shut. The city, taking no position.

