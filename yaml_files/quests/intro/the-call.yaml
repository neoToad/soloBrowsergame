- key: the-call__roughed-up-win
  scene_type: normal
  title: Roughed Up Win
  order: 75
  body: "Terrell's on the ground. His friends, who had opinions about this earlier,\
    \ have revised them and left. You go through his pockets while he's still deciding\
    \ whether to do something about that \u2014 a hundred and fifty in crumpled bills\
    \ and a pair of brass knuckles with somebody else's initials scratched into the\
    \ base, which tells a small story you don't have time for right now.\n\nYour ribs\
    \ are going to have thoughts about this tomorrow. You pocket both and go.\n\n\
    You text Vickie. It's done. The message sits on read.\n"
