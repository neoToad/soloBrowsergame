- key: the-call__done-clean
  scene_type: ending
  title: Done Clean
  order: 80
  body: 'Back in the apartment. Radiator having its opinions. The boot-shaped water
    stain unchanged, indifferent, exactly where you left it.


    You didn''t have to break anything tonight. That used to be the baseline and somewhere
    along the way it became an achievement, which is either personal growth or a bad
    sign and you''re not ready to decide which.


    Vickie sends another message an hour later. Just: thank you. No punctuation, which
    means she agonised over it. You know her. She probably typed it six different
    ways.


    The corkboard on the back of the door has one job pinned to it. The city is paying
    attention. That''s something.

    '
