- key: the-call__done-rough
  scene_type: ending
  title: Done Rough
  order: 85
  body: 'Back in the apartment. Ribs announcing themselves every time you breathe
    wrong. The hundred and fifty from Terrell''s pocket on the counter next to the
    brass knuckles with the stranger''s initials, which you should probably get rid
    of and probably won''t.


    Vickie never texted back. That''s fine. You didn''t do it for the reply.


    The corkboard on the back of the door has one job pinned to it. Not a bad Tuesday,
    all things considered. The bar for that is low, but it''s a bar.

    '
