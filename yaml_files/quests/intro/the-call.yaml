  # -------------------------
  # WHY YOU
  # -------------------------

  - key: the-call__why-you
    scene_type: normal
    title: Why You
    order: 30
    body: |
      She lets the silence run for a moment, like she's deciding how honest to be, which is usually a bad sign with Vickie because her honest and everyone else's honest are not always the same document.

      "Because there's nobody else," she says. "Because you're already the worst thing that could happen to someone, so what's one more time."

      It lands exactly like she means it to. You don't argue. There's nothing useful to argue with.

