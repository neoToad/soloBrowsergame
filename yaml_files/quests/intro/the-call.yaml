- key: the-call__her-voice
  scene_type: normal
  title: Her Voice
  order: 20
  body: "She doesn't say hello. She launches into it like she's been rehearsing, which\
    \ she probably has \u2014 Vickie always rehearses the part where she asks for\
    \ something and never quite the part that comes before it.\n\n\"There's this guy,\
    \ Terrell. Young, maybe twenty-five, gold chain, acts like he's somebody. He keeps\
    \ coming around saying I owe him for something Destiny ran up \u2014 my neighbor,\
    \ it's complicated, I'll explain later. Second time he came by he put his hand\
    \ on my door frame and told me if I didn't have something for him by the end of\
    \ the week he was gonna break my legs.\" A pause. \"He said it like that. Just\
    \ said it. Like it was nothing.\"\n\nYou ask if she's okay. Long pause.\n\n\"\
    I'm fine,\" she says. \"I just need it to stop.\"\n\nAnother pause. Longer.\n\n\
    \"I didn't want to call you,\" she says. \"I want you to know that.\" Which is\
    \ a very Vickie thing to say to someone she is currently calling.\n"
