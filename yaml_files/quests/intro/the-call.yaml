- key: the-call__beaten
  scene_type: ending
  title: Beaten
  order: 90
  body: "You come to on the pavement outside Vickie's building, which is not where\
    \ you intended to end up tonight. Ribs aching, wallet lighter \u2014 someone took\
    \ the liberty while you were unavailable to object. The stoop light is still flickering.\
    \ It was flickering before. It'll be flickering tomorrow.\n\nYou don't go up.\
    \ You can't do that conversation right now, can't stand in Vickie's doorway looking\
    \ like this and tell her it's handled. You just walk. The Flats swallows you up\
    \ the way it always has \u2014 wide streets, low buildings, sky overhead doing\
    \ nothing in particular \u2014 and after a while you stop thinking about it.\n\
    \nYour phone has no new messages.\n"
