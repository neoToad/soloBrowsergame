- key: the-call__the-fight
  scene_type: combat
  title: The Fight
  order: 60
  body: "Terrell squares up before you've finished closing the distance. He's done\
    \ this before \u2014 you can see it in how he sets his feet, how his hands come\
    \ up. He's got reach and he knows it. What he doesn't have is patience.\n\nSomewhere\
    \ above you a window slides shut. The city, taking no position.\n"
