- key: the-call__why-you
  scene_type: normal
  title: Why You
  order: 30
  body: "She lets the silence run for a moment, like she's deciding how honest to\
    \ be.\n\n\"Because you're the only person I know who can actually do something\
    \ about it,\" she says. Then, quieter \u2014 \"And because you owe me. You owe\
    \ me about a thousand.\"\n\nIt lands exactly like she means it to. You don't argue.\
    \ There's nothing useful to argue with.\n"
