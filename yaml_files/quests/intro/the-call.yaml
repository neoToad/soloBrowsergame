- key: the-call__terrell
  scene_type: normal
  title: Terrell
  order: 40
  body: "Vickie's building is a six-storey walkup off Decker Avenue, the kind of street\
    \ that's been the same for forty years and is starting to notice. Terrell is exactly\
    \ where she said he'd be \u2014 leaning against the stoop railing with the specific\
    \ posture of someone who has decided that particular railing belongs to him now.\
    \ Young. Maybe twenty-five. Gold chain, clean sneakers, the kind of eyes that\
    \ clock you the second you turn the corner and don't look away after.\n\nHe watches\
    \ you come without moving. When you're close enough he tilts his head.\n\n\"You\
    \ lost?\" he says.\n"
