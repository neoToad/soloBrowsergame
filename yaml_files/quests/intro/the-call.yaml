- key: the-call__backed-off
  scene_type: normal
  title: Backed Off
  order: 70
  body: "Terrell thinks about it for a moment \u2014 genuinely thinks, which is more\
    \ than you expected \u2014 and then he pockets his phone and goes. No exit line.\
    \ No last look. The ones who are actually scared never need the exit line.\n\n\
    You text Vickie two words. It's done.\n\nShe replies in three minutes with a thumbs\
    \ up. A single thumbs up, after three years. You stare at it longer than makes\
    \ sense and then put your phone away.\n"
