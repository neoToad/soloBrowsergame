  # -------------------------
  # SQUEEZE — ROLL SCENE
  # -------------------------

  - key: the-call__squeeze
    scene_type: normal
    title: Squeeze
    order: 50
    body: |
      You tell him who you're there for. Then you tell him — quietly, without any particular emotion in it — what happens if he comes back. Not a speech. Just the information, laid out plainly, the way you'd explain a bus route. The trick is meaning it more than he does, and making sure he can tell the difference.

      Terrell is listening. Behind the performance of not being impressed, something is doing the math.

    roll:
