  # -------------------------
  # HER VOICE
  # -------------------------

  - key: the-call__her-voice
    scene_type: normal
    title: Her Voice
    order: 20
    body: |
      She doesn't say hello. She launches into it like she's been rehearsing, which she probably has — Vickie always rehearses the part where she asks for something and never quite the part that comes before it.

      There's a guy. His name is Terrell. He's been coming around her building saying she owes him for something her neighbour ran up, wrong place, wrong association, it's complicated, she'll explain later. What matters is he came by twice this week and the second time he put his hand on the door frame and leaned in, and Vickie — who is not, she wants you to understand, easily rattled — has been sleeping with the chain on.

      You ask if she's okay. Long pause.

      "I'm fine," she says. "I just need it to stop."

      Another pause. Longer.

      "I didn't want to call you," she says. "I want you to know that." Which is a very Vickie thing to say to someone she is currently calling.

