      receive_property: null
      lose_property: null
    scene_items: []
    scene_contacts: []

    choices:
      - label: Report back to Morris
        order: 1
        target_scene: corkys__done-dealers-in
        success_scene: null
        failure_scene: null
        arrival_flavor: Morris sounds pleased. That's the word — pleased. Like something being checked off a list.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # SAL FOLDS — LEVERAGED
  # -------------------------

  - key: corkys__sal-folds-leveraged
    scene_type: normal
    title: Sal Folds Leveraged
    order: 72
    body: |
      He looks at the shelf for a long time. Then back at you. Then
      he gives a small nod — not agreement exactly, more like a man
      accepting a diagnosis he already suspected.

      He says the dealers can come back. He says it like it's a
      business decision, which is what you gave him. A way to frame
      it that wasn't pure capitulation. You're not sure whether that's
      a kindness or not.

      He goes back to the bar. You leave him to it.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null
    ending:
      ending_type: null
    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 3
      consume_item: null
      receive_property: null
      lose_property: null
    scene_items: []
    scene_contacts: []

    choices:
      - label: Report back to Morris
        order: 1
        target_scene: corkys__done-dealers-in
        success_scene: null
        failure_scene: null
        arrival_flavor: Morris sounds satisfied. He doesn't ask how you got there.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # SAL HOLDS FIRM
  # -------------------------

  - key: corkys__sal-holds-firm
    scene_type: normal
    title: Sal Holds Firm
    order: 75
    body: |
      He's not moving. You can see it — the decision is already made
      and whatever you say next is just noise. Some people get to a
      point where the fear stops working and all that's left is the
      thing they're protecting. Sal's at that point.

      You don't push it further. There's a version of this where you
      break him and it doesn't feel like anything you want to be today.

      You tell him Dutch will be in touch. He says he knows. You leave.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null
    ending:
      ending_type: null
    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null
    scene_items: []
    scene_contacts: []

    choices:
      - label: Report back to Morris
        order: 1
        target_scene: corkys__done-sal-caved
        success_scene: null
        failure_scene: null
        arrival_flavor: Morris listens. Then he says Dutch will handle it himself. You're not sure if that's better or worse for Sal.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # VICTORY ENDING — DEALERS IN
  # -------------------------

  - key: corkys__done-dealers-in
    scene_type: ending
    title: Done Dealers In
    order: 80
    body: |
      Morris calls that evening with the payout. Two hundred for the
      job. Dutch is satisfied. The dealers go back into Corky's starting
      Thursday and the situation is resolved.

      You don't go back to the bar. You don't have a reason to.

      The money goes in the drawer with the rest. The corkboard has
      another slip on it — Morris works fast. You're useful now. That's
      a thing you are.

      You think about Sal restocking his glasses. The two old men at
      the end of the bar. Whether they'll notice the dealers coming
      back in on Thursday, and if they do, whether they'll say anything
      about it. Probably not. That's the thing about places like
      Corky's. People get very good at not noticing.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null
    ending:
      ending_type: victory
    arrival:
      cash_change: 200
      rep_change: 10
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null
    scene_items: []
    scene_contacts: []

    choices:
      - label: Back to the apartment
        order: 1
        target_scene: hub__apartment
        success_scene: null
        failure_scene: null
        arrival_flavor: Dutch knows you get results. That's the job. That's what you told yourself.
        failure_arrival_flavor: null
        set_flag_name: corkys_dealers_in
        clear_flag_name: null
        requirements: []

  # -------------------------
  # DEFEAT ENDING — SAL HOLDS
  # -------------------------

  - key: corkys__done-sal-holds
    scene_type: ending
    title: Done Sal Holds
    order: 85
    body: |
      Morris calls back two hours later. Dutch looked at the
      counter-offer. The answer is no. The dealers go back in on
      Dutch's terms or the conversation becomes a different one.

      Morris pauses. Then he says Dutch appreciated the creative
      approach. That you showed initiative. He says it like a man
      reading from a card.

      No payout on this one. You didn't deliver what was asked. Morris
      says there'll be more work. He says it carefully, which means he's
      not sure.

      You sit with the bar napkin photo on your phone for a while.
      Sal built himself a counter-offer on a napkin and it lasted
      two hours. You're not sure what that says about either of you.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null
    ending:
      ending_type: defeat
    arrival:
      cash_change: 0
      rep_change: -5
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null
    scene_items: []
    scene_contacts: []

    choices:
      - label: Back to the apartment
        order: 1
        target_scene: hub__apartment
        success_scene: null
        failure_scene: null
        arrival_flavor: Sal's holding out. For now. You hope he knows what that costs.
        failure_arrival_flavor: null
        set_flag_name: corkys_sal_holds
        clear_flag_name: null
        requirements: []

  # -------------------------
  # NEUTRAL ENDING — SAL CAVED
  # -------------------------

  - key: corkys__done-sal-caved
    scene_type: ending
    title: Done Sal Caved
    order: 90
    body: |
      Dutch handled it himself. You don't know what that means exactly
      and Morris doesn't elaborate. What you know is that two days later
      the dealers are back in Corky's and Sal is still behind the bar
      and nothing visible has changed.

      Morris sends a hundred your way. Half rate. You showed up and
      made the ask, even if you didn't close it. That's worth something,
      apparently. Fifty less than something.

      You think about Sal. Whether he's okay. Whether okay is even the
      right question for a man in his position. He's still got the bar.
      That's probably what he'd say if you asked him.

      You don't ask him.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null
    ending:
      ending_type: neutral
    arrival:
      cash_change: 100
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null
    scene_items: []
    scene_contacts: []

    choices:
      - label: Back to the apartment
        order: 1
        target_scene: hub__apartment
        success_scene: null
        failure_scene: null
        arrival_flavor: The city keeps score differently than you do. You're still learning its system.
        failure_arrival_flavor: null
        set_flag_name: corkys_sal_caved
        clear_flag_name: null
        requirements: []
