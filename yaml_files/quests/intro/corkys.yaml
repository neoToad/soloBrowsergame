        failure_arrival_flavor: He tells you his finances are none of your business. Tells you to get out. His voice is steady. He means it.
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # SAL TALKS
  # -------------------------

  - key: corkys__sal-talks
    scene_type: normal
    title: Sal Talks
    order: 60
    body: |
      He talks. Once he starts he doesn't stop for a while.

      He inherited Corky's four years ago from a man named Dennis who
      was his closest friend for twenty years and who left town in a
      hurry for reasons Sal has never pressed on. The bar wasn't making
      money then and it's barely making money now. He's kept it going
      because it was Dennis's and because the regulars have nowhere else
      to go and because some part of him still thinks it might turn
      around.

      The dealers bother him less than the principle. It's his bar. If
      he can't decide who comes in and who doesn't then it's not really
      his bar. It's just a bar he works at.

      He stops. Looks embarrassed. Says he doesn't know why he's telling
      you this.

      You do. He's telling you because nobody has asked in a long time
      and because he's tired of holding it by himself.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null
    ending:
      ending_type: null
