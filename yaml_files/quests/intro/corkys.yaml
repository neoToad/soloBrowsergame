  # -------------------------
  # ENTRANCE SCENE
  # -------------------------

  - key: corkys__the-brief
    scene_type: normal
    title: The Brief
    order: 10
    body: |
      Morris has another job. He lays it out over the phone this time —
      you've apparently graduated past needing to meet in person.

      There's a bar in the Flats called Corky's. Dutch's people have
      been using it as a sales floor for years — high foot traffic,
      regular clientele, nobody asking questions. The owner, a guy
      named Sal, inherited the place from a friend who left town. Sal
      has decided he wants it clean. He told Dutch's dealers to stop
      coming in. One of them got mouthy about it and Sal threw him out.

      Dutch is not angry. Dutch is never angry. Dutch just wants the
      situation resolved. The bar stays open, the dealers go back in,
      Sal understands how things work in the Flats. Simple.

      Morris doesn't say what happens if Sal keeps pushing. He doesn't
      need to.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null
    ending:
      ending_type: null
