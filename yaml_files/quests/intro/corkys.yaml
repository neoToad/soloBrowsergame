  # -------------------------
  # LEVERAGE (CUNNING ROLL)
  # -------------------------

  - key: corkys__leverage
    scene_type: normal
    title: Leverage
    order: 55
    body: |
      You ask him about the envelopes. He goes still.

      You tell him you're not here to make it worse — you're here to
      find an arrangement that works. Dutch's operation running through
      the bar is quiet income on top of what the bar makes. It's not
      nothing, especially when the cellophane-window envelopes are
      stacking up. You're not telling him anything he doesn't know.
      You're just saying it out loud so you're both looking at the
      same picture.

      He doesn't like it. That's fine. Liking it isn't the ask.

    roll:
      requires_roll: true
      roll_stat: intellect
      roll_difficulty: 11
    ending:
      ending_type: null
    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
