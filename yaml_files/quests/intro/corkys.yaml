  # -------------------------
  # THE BAR
  # -------------------------

  - key: corkys__the-bar
    scene_type: normal
    title: The Bar
    order: 20
    body: |
      Corky's is the kind of bar that has been exactly the same for
      thirty years and will be exactly the same for thirty more, or
      until the building gets sold out from under it. Dark wood. A
      jukebox that still takes quarters. Two old men at the far end
      nursing pints like it's a job.

      Sal is behind the bar. Fifties, heavyset, the kind of tired that
      comes from running a place alone. He clocks you the moment you
      walk in — not with fear, just attention. He's been expecting
      someone. Maybe not you specifically. Someone.

      He doesn't stop wiping down the bar.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null
    ending:
      ending_type: null
