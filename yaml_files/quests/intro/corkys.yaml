  # -------------------------
  # READ THE ROOM
  # -------------------------

  - key: corkys__read-the-room
    scene_type: normal
    title: Read The Room
    order: 30
    body: |
      You sit with it for twenty minutes. The bar tells you things.

      There's a photo behind the register — Sal with an older man,
      both of them grinning, the bar in the background looking exactly
      the same as it does now. The friend who left it to him, probably.
      On the shelf below it, a stack of envelopes. The kind with
      cellophane windows. Bills. More than a few.

      One of the regulars at the end of the bar calls Sal by name when
      he needs a refill. Sal knows his drink without being told. Knows
      the other one's too. This is a man who has built something small
      and is holding onto it.

      He's also behind on something. The envelopes are the kind you
      don't leave on the shelf unless you're hoping they'll sort
      themselves out.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null
