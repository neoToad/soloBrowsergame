  # -------------------------
  # SAL FACE TO FACE
  # -------------------------

  - key: corkys__sal-face-to-face
    scene_type: normal
    title: Sal Face To Face
    order: 40
    body: |
      Sal puts the cloth down. Folds his arms on the bar. He's not
      aggressive — just done pretending he doesn't know why you're here.

      He says he knows who sent you. Says Dutch's people have been
      using his bar for three years and he should have said something
      sooner. Says he doesn't want trouble. He just wants to run his
      bar. He says that last part quietly, like he knows how it sounds.

      Behind him, the photo. The envelopes. The jukebox cycles to
      something slow and nobody changes it.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null
