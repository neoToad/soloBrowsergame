  # -------------------------
  # COUNTER-OFFER
  # -------------------------

  - key: corkys__counter-offer
    scene_type: normal
    title: Counter Offer
    order: 65
    body: |
      The offer you help him build is simple. Sal keeps Corky's clean
      on weeknights — his regulars, his rules. Weekend afternoons,
      Dutch's people can work the room. It's not what Dutch asked for
      but it's not nothing. More importantly, it's sustainable. Sal
      won't keep folding on an arrangement he resents. Dutch knows
      that. Operations that run on resentment leak.

      Sal writes it down on a bar napkin like that makes it official.
      You don't tell him it doesn't. It costs nothing to let him have
      the napkin.

      You take a photo of it on your phone. Tell him you'll pass it up
      the chain. Tell him Dutch is a reasonable man. You've never met
      Dutch. You have no idea if that's true.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null
    ending:
      ending_type: null
    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null
    scene_items: []
    scene_contacts: []

    choices:
      - label: Report back to Morris
        order: 1
        target_scene: corkys__done-sal-holds
        success_scene: null
        failure_scene: null
        arrival_flavor: Morris is quiet for longer than you'd like. Then he says he'll pass it on. He doesn't say Dutch will accept it.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # SAL FOLDS — INTIMIDATED
  # -------------------------

  - key: corkys__sal-folds-intimidated
    scene_type: normal
    title: Sal Folds Intimidated
    order: 70
    body: |
      He nods at the bar top. Says fine. One word. Then he goes to the
      other end of the bar and starts restocking glasses and doesn't
      look at you again.

      You sit there for a moment longer than you need to. The two old
      men at the end haven't moved. The jukebox is between songs.

      You did the job. That's what this was.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null
    ending:
      ending_type: null
    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 5
