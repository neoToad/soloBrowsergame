  # -------------------------
  # LEAN ON SAL (NERVE ROLL)
  # -------------------------

  - key: corkys__lean-on-sal
    scene_type: normal
    title: Lean On Sal
    order: 50
    body: |
      You don't threaten him. You don't need to. You just lay out the
      geography — Dutch has been in the Flats longer than Sal has owned
      this bar. The dealers coming back in is not a negotiation. The
      only question is whether Sal makes it difficult or whether he
      makes it easy.

      You watch him process it. He's not a stupid man. He knows what
      you're saying. He knows what it means if he keeps pushing.

      He's deciding whether the bar is worth it.

    roll:
      requires_roll: true
      roll_stat: charisma
      roll_difficulty: 12
    ending:
      ending_type: null
    arrival:
