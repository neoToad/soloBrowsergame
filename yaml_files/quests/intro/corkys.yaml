quest:
  key: corkys
  title: Corky's
  description: >
    Dutch wants his dealers back in a bar called Corky's. The owner
    pushed back. You're the push.
  arc: intro
  arc_order: 3
  is_repeatable: false
  hub_scenes:
    - hub__apartment
  entrance_scene: corkys__the-brief
