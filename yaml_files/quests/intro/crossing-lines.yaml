- key: crossing-lines__morris-calls
  scene_type: normal
  title: Morris Calls
  order: 10
  body: "Morris calls mid-afternoon.\n\nHe gives you an address in the Westside, another\
    \ on the Strip, and a final drop that he describes as \u201Cself-explanatory,\u201D\
    \ which is not a phrase Morris uses unless he has decided you don\u2019t need\
    \ the explanation.\n\nYou ask what you\u2019re carrying.\n\n\u201CPackage,\u201D\
    \ Morris says.\n\nA pause. Then:\n\n\u201CComplete the sequence. Do not improvise.\u201D\
    \n\nHe hangs up.\n\nThe package is already outside your door."
