    \ people on stoops who don\u2019t look at you directly but also don\u2019t look\
    \ away. The kind of attention that doesn\u2019t ask questions because it already\
    \ has answers.\n\nA guy across the street leans against a railing, watching you\
    \ without watching you.\n\n\u201CYou\u2019re not from here,\u201D he says.\n"
