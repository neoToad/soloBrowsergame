enemies:

  # -------------------------
  # STREET LEVEL
  # -------------------------

  - key: street_thug
    name: Street Thug
    description: >
      Nobody's soldier. Works alone or in loose pairs, opportunistic. Not
      trained, not disciplined, but willing enough that it amounts to the same
      thing in a dark stairwell.
    max_hp: 18
    attack_modifier: 1
    defense: 9
    damage_min: 2
    damage_max: 6

  - key: street_thug_x2
    name: Two Street Thugs
    description: >
      Separately, a problem. Together, a system — one pushes, one flanks.
      They've done it before. Not coordinated exactly, but practiced.
    max_hp: 32
    attack_modifier: 3
    defense: 10
    damage_min: 3
    damage_max: 8

  - key: street_thug_x3
    name: Three Street Thugs
    description: >
      Numbers are the whole strategy. They know it. You know it. The only
      question is whether you can make that strategy expensive enough that
      someone reconsiders.
    max_hp: 40
    attack_modifier: 4
    defense: 10
    damage_min: 4
    damage_max: 10

  - key: corner_boy
    name: Corner Boy
    description: >
      Kings or BSB, depending on the block. Low-tier, more committed than a
      generic thug. Has something to prove, which makes him more dangerous
      than his experience warrants.
    max_hp: 20
    attack_modifier: 2
    defense: 10
    damage_min: 2
    damage_max: 7

  - key: westside_runner
    name: Westside Runner
    description: >
      Young, fast, not yet sure how much he's willing to lose. Kings material
      but not there yet. The danger is that he's trying to prove something,
      which makes him harder to read than someone who knows what they're doing.
    max_hp: 20
    attack_modifier: 2
    defense: 10
    damage_min: 2
    damage_max: 7

  - key: westside_pair
    name: Two Westside Runners
    description: >
      Both young, both fast, both with something to prove. The problem with
      fighting people who haven't learned their limits yet is that they
      don't know when to stop.
    max_hp: 36
    attack_modifier: 3
    defense: 11
    damage_min: 3
    damage_max: 9

  - key: terrell
    name: Terrell
    description: >
      Young, maybe twenty-five. Gold chain, clean sneakers, eyes that clock
      you the second you round the corner. Got reach but no discipline. The
      stoop light flickers. Somewhere above you a window slides shut.
    max_hp: 24
    attack_modifier: 2
    defense: 11
    damage_min: 3
    damage_max: 8

  # -------------------------
  # HARLAN STREET CREW
  # -------------------------

  - key: harlan_muscle
    name: Harlan Street Muscle
    description: >
      Dutch sends muscle, not lawyers. This is the muscle. Older than the
      Kings' guys, quieter about it, less interested in the theatre of
      the thing. Has done this enough times that it's just work.
    max_hp: 30
    attack_modifier: 3
    defense: 12
    damage_min: 3
    damage_max: 8

  - key: harlan_muscle_x2
    name: Two Harlan Muscle
    description: >
      One talks, one doesn't. The one who doesn't is the problem. Dutch's
      people work in pairs for a reason — they've thought about the geometry
      of a room before they walk into it.
    max_hp: 52
    attack_modifier: 4
    defense: 12
    damage_min: 4
    damage_max: 9

  - key: harlan_enforcer
    name: Harlan Enforcer
    description: >
      Mid-tier. Professional. Doesn't get creative, doesn't make mistakes.
      Not the guy Dutch sends when he wants to make a point — the guy Dutch
      sends when the point has already been made and ignored.
    max_hp: 36
    attack_modifier: 4
    defense: 13
    damage_min: 4
    damage_max: 10

  - key: dutch_enforcer
    name: Dutch's Enforcer
    description: >
      Doesn't talk much. Doesn't need to. The fact that Dutch sent him
      specifically means you've cleared through everything else and arrived
      somewhere serious.
    max_hp: 40
    attack_modifier: 4
    defense: 13
    damage_min: 4
    damage_max: 10

  # -------------------------
  # WESTSIDE KINGS
  # -------------------------

  - key: kings_soldier
    name: Kings Soldier
    description: >
      Generational Westside. Knows every block, every exit, every face that
      doesn't belong. Fights like someone who grew up fighting — territorial,
      committed, not easily rattled.
    max_hp: 28
    attack_modifier: 3
    defense: 11
    damage_min: 3
    damage_max: 8

  - key: kings_enforcer
    name: Kings Enforcer
    description: >
      Senior muscle. Deliberate. Slower than a soldier but reads the room
      in a way the soldiers don't bother with. The loose council structure
      means he's answering to someone, but you won't know who until it matters.
    max_hp: 38
    attack_modifier: 4
    defense: 13
    damage_min: 4
    damage_max: 10

  - key: kings_lieutenant
    name: Kings Lieutenant
    description: >
      One of several. The internal politics mean he's always half-managing
      someone else's problem as well as his own. Experienced, genuinely
      dangerous, and irritable about it.
    max_hp: 38
    attack_modifier: 4
    defense: 13
    damage_min: 4
    damage_max: 10

  - key: pruitt_crew
    name: Pruitt's Crew
    description: >
      Loyalists. Fight together and won't run unless Pruitt's out. The
      northern Westside blocks are their floor and they know every inch of it.
      Removing them is a statement, and the Kings' council will read it as one.
    max_hp: 48
    attack_modifier: 4
    defense: 12
    damage_min: 4
    damage_max: 10

  # -------------------------
  # BACKSTREET BOYS
  # -------------------------

  - key: bsb_soldier
    name: BSB Soldier
    description: >
      Punches up in self-image. Punches at or below weight in practice.
      Craig's people confuse flash for power and it shows. The danger is
      volume — they come in numbers because individually they know better.
    max_hp: 22
    attack_modifier: 2
    defense: 10
    damage_min: 3
    damage_max: 7

  - key: darius
    name: Darius
    description: >
      Named enemy. Competent. Mid-level operator in Craig's orbit who runs
      Strip-adjacent work without permission. Young, ambitious, committed to
      a version of himself that is doing very well. Loses because he misjudged
      the situation, not because he's weak. Dangerous in a rematch.
    max_hp: 34
    attack_modifier: 4
    defense: 12
    damage_min: 4
    damage_max: 9

  - key: craig_security
    name: Craig's Security
    description: >
      Professional hired help, not crew. Impersonal. More effective than BSB
      regulars because they don't have anything to prove — they're just working.
      Craig pays well enough to get the good kind.
    max_hp: 32
    attack_modifier: 4
    defense: 13
    damage_min: 4
    damage_max: 9

  # -------------------------
  # BUCCO FAMILY
  # -------------------------

  - key: bucco_associate
    name: Bucco Associate
    description: >
      Old world structure means old world patience. He will wait for the right
      moment in a way that street crews genuinely can't. Suit jacket. Doesn't
      raise his voice. The calm is the threat.
    max_hp: 32
    attack_modifier: 3
    defense: 13
    damage_min: 4
    damage_max: 9

  - key: bucco_muscle
    name: Bucco Muscle
    description: >
      Hired. Large. The kind of large that comes with a suit. Very little
      expression. Doesn't want to be here any more than you do, which is
      somehow not reassuring.
    max_hp: 40
    attack_modifier: 4
    defense: 13
    damage_min: 4
    damage_max: 11

  - key: bucco_capo
    name: Bucco Capo
    description: >
      Been with the family long enough that Richie Bucco knows his children's
      names. That's not warmth — that's depth of investment. Removing him
      is a family matter now, not just a business one.
    max_hp: 50
    attack_modifier: 5
    defense: 14
    damage_min: 5
    damage_max: 12

  - key: dockworker_hostile
    name: Hostile Dockworker
    description: >
      Not mob, but mob-adjacent. Union solidarity takes interesting forms at
      the Docks. Has been doing physical work for thirty years and it shows.
      Didn't want this fight. Is going to finish it anyway.
    max_hp: 30
    attack_modifier: 3
    defense: 11
    damage_min: 3
    damage_max: 9

  # -------------------------
  # THE BLUES
  # -------------------------

  - key: blues_officer
    name: Blues Officer
    description: >
      Cahill's people. Doesn't say anything incriminating. Doesn't need to —
      the badge does the threatening. Trained, structured, and operating with
      the full weight of the system behind him. Combat with a Blues officer
      is a serious escalation. The heat cost is significant. Not a casual encounter.
    max_hp: 35
    attack_modifier: 4
    defense: 14
    damage_min: 4
    damage_max: 10

  - key: cahill_detail
    name: Cahill's Detail
    description: >
      Two plainclothes officers. Professional. Arrives without announcement.
      The fact that Cahill sent a detail means he's paying attention, which
      is the second worst thing that can happen. The worst thing is what
      the detail does when it gets there.
    max_hp: 60
    attack_modifier: 5
    defense: 14
    damage_min: 5
    damage_max: 11

  # -------------------------
  # NAMED / SPECIAL
  # -------------------------

  - key: big_mal
    name: Big Mal
    description: >
      Independent heavy. For hire. No faction loyalty — works for whoever's
      paying, which tells you everything about the person who sent him. Shows
      up when someone wants to send a message they're paying for. The message
      is that they're serious enough to pay for Mal.
    max_hp: 55
    attack_modifier: 5
    defense: 14
    damage_min: 5
    damage_max: 12

  - key: the_cook
    name: The Cook
    description: >
      Defensive encounter only — he didn't want this. Zonk cook, not a
      fighter. Has been improvising solutions to problems his whole life and
      that habit does not turn off under pressure. Better with improvised
      weapons than anyone expects. The workspace gives him options.
    max_hp: 22
    attack_modifier: 2
    defense: 10
    damage_min: 3
    damage_max: 8


contacts:

  # -------------------------
  # FACTION — HARLAN STREET CREW
  # -------------------------

  - key: morris
    name: Morris
    description: >
      Dutch's intermediary. Transactional, precise, slightly disappointing to
      talk to in the way that efficient people are. Calls when he has
      information and hangs up when he's done. Says things like "acceptable"
      and "noted." Has no evident inner life but occasionally says something
      that suggests he might.

  - key: dutch
    name: Dutch
    description: >
      Runs the Harlan Street Crew out of The Flats. Old school, disciplined,
      fingers in everything quietly. Never wastes words. The fact that he's
      dealing with you directly means something — you're not sure yet whether
      it's good.

  # -------------------------
  # FACTION — BUCCO FAMILY
  # -------------------------

  - key: richie_bucco
    name: Richie Bucco
    description: >
      Runs the Bucco Family. Will talk to you for forty minutes about cold
      pressing olive oil. Genuinely knowledgeable about it. Something terrible
      may happen before dinner regardless. The oldest outfit in the city and
      he carries that history like it's earned, because it is.

  # -------------------------
  # FACTION — WESTSIDE KINGS
  # -------------------------

  - key: kings_contact
    name: Kings Contact
    description: >
      No one name, no one throat to grab. The council structure means your
      contact today might not be your contact tomorrow. Useful for exactly as
      long as the internal politics allow it.

  - key: pruitt
    name: DeShawn Pruitt
    description: >
      One of the Kings' council's more stable voices. Runs the northern
      Westside blocks. Former high school football player with a scholarship
      that fell through in a way he doesn't like to discuss. Still keeps a
      football in his apartment. The three hundred dollars he owes you has
      been in a ziplock bag in his freezer for four months. He was going to
      call.

  # -------------------------
  # FACTION — BACKSTREET BOYS
  # -------------------------

  - key: craig_richards
    name: Craig Richards
    description: >
      Insists on being called King. Everyone calls him Craig. He hates it.
      Runs the Backstreet Boys out of The New Build and The Strip. Believes
      every word of his own hype. Making decent money. Nobody respects him
      for it, which he is aware of and has completely failed to address.

  # -------------------------
  # FACTION — THE BLUES
  # -------------------------

  - key: frank_cahill
    name: Lt. Frank Cahill
    description: >
      Major Crimes Unit. Taxes every crew in the city except Dutch, with whom
      he has a relationship built entirely on implication. Bureaucratically
      polite at all times. Never says anything incriminating. Built his
      operation from inside the system over decades. The scariest person in
      the city.

  # -------------------------
  # CIVILIANS
  # -------------------------

  - key: sister
    name: Vickie
    description: >
      Your sister. Calls only when she needs something. Genuinely loves you
      in her way, which is real but will immediately generate the next problem
      the moment the current one is solved. A chaos agent who does not
      consider herself a chaos agent. Heavy Zonk user. Always completely
      confident.

  - key: sal
    name: Sal
    description: >
      Owns Corky's in The Flats. Inherited it from a friend who left town and
      just wants to run a quiet bar. Tired, not defeated. Dutch's people have
      been using his floor for years and he wants them out. The longer you
      talk to him the more uncomfortable the moral math gets.

  - key: eddie_reyes
    name: Eddie Reyes
    description: >
      Runs Reyes Boxing in The Flats, two blocks from Corky's. Been there
      thirty years. Listens more than he talks. The only person in the city
      who has told Dutch, Cahill, and Richie Bucco something they didn't want
      to hear and had all three thank him. Nobody brings their business through
      his door. Doesn't broker deals. Occasionally points someone in a
      direction. Once. Doesn't follow up.

  - key: linda_marsh
    name: Councilor Linda Marsh
    description: >
      City councilor for The Flats and the border of The New Build. Publicly
      the voice of community preservation. Quietly taking money from the
      developers eating her district alive. Frank Cahill uses her for planning
      permissions and the occasional burial of an investigation. Has a
      newsletter with a recipe section. Owns a rescue dog named Biscuit.
      Has been making one small reasonable decision at a time for eleven years
      and can't see the shape of what she's built anymore.
