  # THE DOCKS
  # Bucco Family territory, waterfront
  # -------------------------

  - key: hub__docks
    scene_type: hub
    title: The Docks
    order: 0
    body: |
      The waterfront smells like it always has: diesel, brine, and the specific rot of things left in water too long. The Bucco family has worked these docks for two generations. Not loudly. The union halls and the shipping offices and the cold storage warehouses all have the look of legitimate operations because most of them are, which is exactly the point.

      The cranes don't stop for anything. Whatever else is moving through here moves on the same schedule.

