  # -------------------------
  # REYES BOXING
  # Eddie's gym, The Flats
  # -------------------------

  - key: hub__reyes_boxing
    scene_type: hub
    title: Reyes Boxing
    order: 0
    body: |
      Thirty years Eddie's been running this gym and it shows — not in neglect but in the particular wear of something used hard and maintained harder. The equipment is old. The floors are clean. The ring in the back has seen things. A speed bag in the corner ticks against its platform with the rhythm of someone who left an hour ago.

      Eddie himself is usually somewhere in the room. Watching, or not watching, in a way that amounts to the same thing.

