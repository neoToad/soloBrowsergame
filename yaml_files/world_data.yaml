# =============================================================================
# WORLD DATA — Gangs and Properties
# Import with: python manage.py import_world world_data.yaml
# =============================================================================
#
# Import order:
#   1. Gang records (no FK dependencies)
#   2. Property records (FK → Scene for resolution_scene, resolved by key)
#
# resolution_scene uses a scene key string. The importer resolves it to a FK
# after scenes exist. If the scene hasn't been imported yet, set to null and
# update on a subsequent run.
# =============================================================================


# -----------------------------------------------------------------------------
# GANGS
# -----------------------------------------------------------------------------

gangs:

  - key: harlan-street-crew
    name: The Harlan Street Crew
    description: |
      Old school, disciplined, fingers in everything quietly. Been
      around long enough that their presence feels like the natural
      order of things. Dealing, protection, stolen goods, gambling —
      none of it sloppy. Sends muscle, not lawyers.

  - key: westside-kings
    name: The Westside Kings
    description: |
      Loose council leadership — no one throat to grab, constantly
      simmering internal tension. Fast moving, fractious. More
      dangerous than they look on paper because there's no clear head.

  - key: backstreet-boys
    name: The Backstreet Boys
    description: |
      Newer crew. Confuse flash for power. Making decent money but
      nobody respects them for it. Craig believes every word of his
      own hype, and his crew believes it too, which makes them
      unpredictable.

  - key: bucco-family
    name: The Bucco Family
    description: |
      Oldest outfit in the city. Old world structure. Everyone else
      is an annoyance rather than a threat. Will talk to you for
      forty minutes about cold pressing olive oil and then have
      something terrible happen before dinner.

  - key: the-blues
    name: The Blues
    description: |
      Major Crimes Unit. Taxes everyone. Bureaucratically polite at
      all times. Never says anything incriminating. Built from within
      the system by someone who understood it completely.


# -----------------------------------------------------------------------------
# PROPERTIES
# -----------------------------------------------------------------------------
#
# property_type options: safehouse | business | territory
#
# cash_per_turn, heat_per_turn, rep_per_turn: applied each turn while owned.
# Use negative values to subtract (e.g. heat_per_turn: -2 to reduce heat).
#
# is_contestable: if true, other gangs can attempt to take this property.
#
# resolution_scene: scene key for the contest/defence event that fires when
# this property is contested. null if no contest scene exists yet.

properties:

  # --- BUSINESSES ---

  - key: corkys_bar
    name: Corky's Bar
    description: A Flats institution that never should have survived this long and keeps surviving anyway. Sal runs it like a man who has nowhere else to be, which is accurate. The regulars are loyal in the way that people are loyal to things that have stopped surprising them. Owning a piece of this means owning a piece of the neighborhood's institutional memory — and the foot traffic that comes with it.
    property_type: business
    cash_per_turn: 75
    heat_per_turn: 0
    rep_per_turn: 2
    is_contestable: true
    resolution_scene: null

  - key: dockside_warehouse_unit
    name: Dockside Warehouse Unit
    description: One unit in a working dockside warehouse where the union workers have learned to ask the right questions and ignore the wrong ones. High throughput, good cover, plausible deniability baked into the lease. The Buccos have held the surrounding units for years. Having your own foothold here means playing in their yard, which is either an opportunity or a problem depending on how the next six months go.
    property_type: business
    cash_per_turn: 200
    heat_per_turn: 3
    rep_per_turn: 0
    is_contestable: true
    resolution_scene: null

  # --- SAFEHOUSES ---

  - key: westside_safehouse
    name: Westside Safehouse
    description: A second-floor flat on a residential Kings block. Unremarkable from the street, which is the point. The neighbors have seen enough to know what it is and enough to know not to say so. Useful for cooling off after something loud, or for keeping a low profile while the Flats gets too warm. The Kings know it's there. That's a condition of access, not a flaw in the arrangement.
    property_type: safehouse
    cash_per_turn: 0
    heat_per_turn: -2
    rep_per_turn: 0
    is_contestable: true
    resolution_scene: null

  - key: flats_lockup
    name: Flats Lockup
    description: A storage unit on the industrial edge of the Flats, three blocks from anything anyone would call a landmark. Dutch's operation used to run through here before it outgrew the space. The new lock is yours. Nobody comes by. That's the whole value proposition — a place where things can sit quietly until you need them, and where you can do the same.
    property_type: safehouse
    cash_per_turn: 0
    heat_per_turn: -1
    rep_per_turn: 0
    is_contestable: false
    resolution_scene: null

  # --- TERRITORIES ---

  - key: the_flats
    name: The Flats
    description: Old industrial. Wide streets built for trucks that stopped coming years ago, low buildings, working class holdouts who've been here long enough to be furniture. Dutch's turf by default and by tenure. Having a foothold here means having a foothold in the city's oldest criminal infrastructure — the supply chains, the relationships, the unspoken agreements that keep everything moving without anyone having to say so out loud.
    property_type: territory
    cash_per_turn: 100
    heat_per_turn: 1
    rep_per_turn: 3
    is_contestable: true
    resolution_scene: null

  - key: the_westside
    name: The Westside
    description: Dense residential. Corner economy. Generational crews and buildings close enough together that everyone knows what their neighbors had for dinner. Kings territory, contested internally as much as externally. The money here moves in small amounts through a lot of hands, which means owning a piece of it means managing a lot of relationships. The rep it builds is real. So is the friction.
    property_type: territory
    cash_per_turn: 125
    heat_per_turn: 2
    rep_per_turn: 2
    is_contestable: true
    resolution_scene: null

  - key: the_new_build
    name: The New Build
    description: Gentrifying, fast. Glass-front coffee shops next to barbershops that have been there forty years, new money moving in and old operators getting squeezed toward the edges. The Backstreet Boys are here because Craig thinks it looks like the future. He might be right, which is the unsettling part. The territory generates well but doesn't carry weight — nobody respects flash, even when it pays.
    property_type: territory
    cash_per_turn: 150
    heat_per_turn: 1
    rep_per_turn: 1
    is_contestable: true
    resolution_scene: null

  - key: the_strip
    name: The Strip
    description: Commercial corridor, high foot traffic, visible crime dressed up nicely. Bars and restaurants where everybody has somewhere to be and nobody asks questions, which is the whole reason it works. Shared turf, historically — the kind of place where multiple hands are in the same pocket and everyone pretends otherwise. Good money, consistent heat, and the constant low-level negotiation of a place that belongs to whoever's standing in it right now.
    property_type: territory
    cash_per_turn: 175
    heat_per_turn: 2
    rep_per_turn: 2
    is_contestable: true
    resolution_scene: null

  - key: the_hill
    name: The Hill
    description: Old money adjacent. Legitimate fronts, quieter streets, parking that is somehow always available in a way that is either reassuring or unsettling. The Bucco Family's respectable face lives here, which means operating in the Hill means operating in their eyeline. The rep it builds is the kind that opens doors that don't have visible handles. The heat it generates is the quiet kind, which is the kind that accumulates without announcing itself.
    property_type: territory
    cash_per_turn: 200
    heat_per_turn: 1
    rep_per_turn: 4
    is_contestable: true
    resolution_scene: null

  - key: the_docks
    name: The Docks
    description: Waterfront. Shipping infrastructure, old union money, the smell of salt and diesel that never fully leaves your jacket. The Buccos have run this end of the city for thirty years and the workers who remain treat that arrangement like a fact of nature. Having territory here means having access to the city's most reliable import corridor — and having an ongoing conversation with the Bucco Family about where exactly your interests stop and theirs start.
    property_type: territory
    cash_per_turn: 225
    heat_per_turn: 3
    rep_per_turn: 1
    is_contestable: true
    resolution_scene: null
