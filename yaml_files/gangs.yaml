gangs:
- key: backstreet-boys
  name: The Backstreet Boys
  description: 'Newer crew. Confuse flash for power. Making decent money but

    nobody respects them for it. Craig believes every word of his

    own hype, and his crew believes it too, which makes them

    unpredictable.

    '
- key: bucco-family
  name: The Bucco Family
  description: 'Oldest outfit in the city. Old world structure. Everyone else

    is an annoyance rather than a threat. Will talk to you for

    forty minutes about cold pressing olive oil and then have

    something terrible happen before dinner.

    '
- key: harlan-street-crew
  name: The Harlan Street Crew
  description: "Old school, disciplined, fingers in everything quietly. Been\naround\
    \ long enough that their presence feels like the natural\norder of things. Dealing,\
    \ protection, stolen goods, gambling \xE2\u20AC\u201D\nnone of it sloppy. Sends\
    \ muscle, not lawyers.\n"
- key: the-blues
  name: The Blues
  description: 'Major Crimes Unit. Taxes everyone. Bureaucratically polite at

    all times. Never says anything incriminating. Built from within

    the system by someone who understood it completely.

    '
- key: westside-kings
  name: The Westside Kings
  description: "Loose council leadership \xE2\u20AC\u201D no one throat to grab, constantly\n\
    simmering internal tension. Fast moving, fractious. More\ndangerous than they\
    \ look on paper because there's no clear head.\n"
