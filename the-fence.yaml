quest:
  key: the-fence
  title: The Fence
  description: >
    You've been asking around about who moves stolen jewelry in this city.
    The same name keeps coming up. Marek. Dry cleaner's on Ansel Street.
    What you're bringing to that meeting is your own business.
  arc: null
  arc_order: null
  is_repeatable: false
  hub_scenes:
    - hub__apartment
  entrance_scene: the-fence__intro
  requirements:
    - label: Must have completed the box
      logic: all
      conditions:
        - condition_type: quest_completed
          required_quest: the-box
          flag_name: null
          stat_name: null
          stat_value: null
          required_item: null
          required_ending_type: null
          required_contact: null

scenes:

  # -------------------------
  # ENTRANCE SCENE
  # -------------------------

  - key: the-fence__intro
    scene_type: normal
    title: Intro
    order: 10
    body: |
      You've been asking around. Carefully, through the right people,
      in the right bars. Who moves stolen jewelry in this city without
      asking questions. The same name comes back every time. Marek.
      Operates out of a dry cleaner's on Ansel Street. Been there
      fifteen years. Reputation for fair cuts and short memories.

      What you're bringing to that meeting is your own business.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Head to Marek's
        order: 1
        target_scene: the-fence__marek
        success_scene: null
        failure_scene: null
        arrival_flavor: Ansel Street. The dry cleaner's sign flickers. You push the door open.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements:
          - label: Clean or rough exit from the box
            logic: any
            conditions:
              - condition_type: quest_ending
                required_quest: the-box
                required_ending_type: victory
                flag_name: null
                stat_name: null
                stat_value: null
                required_item: null
                required_contact: null
              - condition_type: quest_ending
                required_quest: the-box
                required_ending_type: neutral
                flag_name: null
                stat_name: null
                stat_value: null
                required_item: null
                required_contact: null

      - label: Hit the evidence lockup first
        order: 2
        target_scene: the-fence__lockup
        success_scene: null
        failure_scene: null
        arrival_flavor: The 9th precinct evidence lockup. Basement level. You know someone on intake.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements:
          - label: Got busted on the box
            logic: all
            conditions:
              - condition_type: quest_ending
                required_quest: the-box
                required_ending_type: defeat
                flag_name: null
                stat_name: null
                stat_value: null
                required_item: null
                required_contact: null

  # -------------------------
  # MAREK — FIRST MEETING
  # -------------------------

  - key: the-fence__marek
    scene_type: normal
    title: Marek
    order: 20
    body: |
      The dry cleaner's smells like chemicals and old coffee. Marek
      is fiftyish, heavyset, reading a newspaper behind the counter
      like he's been doing it since before you were born. He doesn't
      look up when you come in.

      You tell him what you've got. He sets the paper down. Looks
      at you the way a man looks at something he's still deciding
      the value of.

      There's a man named Duvall, he says. Owes Marek four months
      of interest on a loan he's been avoiding. Marek wants a
      conversation had. Nothing permanent — just enough that Duvall
      understands the situation has changed. Do that, come back with
      confirmation, and Marek will take a look at the jewels.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Agree
        order: 1
        target_scene: the-fence__duvall
        success_scene: null
        failure_scene: null
        arrival_flavor: Marek slides a piece of paper across the counter. Address on it. Nothing else.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

      - label: Push back on the terms
        order: 2
        target_scene: the-fence__marek-pushback
        success_scene: null
        failure_scene: null
        arrival_flavor: Marek looks up from his newspaper for the first time.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # ROLL SCENE — MAREK PUSHBACK
  # -------------------------

  - key: the-fence__marek-pushback
    scene_type: normal
    title: Marek Pushback
    order: 30
    body: |
      You try to skip the errand, go straight to the deal. Marek
      folds his newspaper in half and sets it on the counter. Waits.

    roll:
      requires_roll: true
      roll_stat: charisma
      roll_difficulty: 11

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Make the case
        order: 1
        target_scene: null
        success_scene: the-fence__duvall-light
        failure_scene: the-fence__duvall
        arrival_flavor: He says the debt is three hundred. Says you can keep fifty if you collect it clean.
        failure_arrival_flavor: He goes back to his newspaper. The address is still on the counter.
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # EVIDENCE LOCKUP (busted path)
  # -------------------------

  - key: the-fence__lockup
    scene_type: normal
    title: Lockup
    order: 40
    body: |
      The 9th precinct evidence lockup is in the basement. You have
      a contact — a civilian clerk named Priya who processes intake
      and has been known to look the other way for the right amount
      of cash. The box was brought in two nights ago. It's sitting
      in a staging bin, not yet logged into the system.

      Priya can get you in during a shift change. You're on your
      own once the door closes.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Go in during shift change
        order: 1
        target_scene: the-fence__lockup-grab
        success_scene: null
        failure_scene: null
        arrival_flavor: Priya holds the door. Doesn't make eye contact. You're in.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

      - label: Wait and watch the building first
        order: 2
        target_scene: the-fence__lockup-grab
        success_scene: null
        failure_scene: null
        arrival_flavor: An hour on a bench across the street. You count the rotations. There's a gap.
        failure_arrival_flavor: null
        set_flag_name: fence_lockup_scouted
        clear_flag_name: null
        requirements: []

  # -------------------------
  # ROLL SCENE — LOCKUP GRAB
  # -------------------------

  - key: the-fence__lockup-grab
    scene_type: normal
    title: Lockup Grab
    order: 50
    body: |
      Inside the evidence room. Fluorescent hum, rows of shelving,
      numbered bins. The box is where Priya said it would be — staging
      bin seven, third shelf. Thirty seconds if nothing goes wrong.

    roll:
      requires_roll: true
      roll_stat: agility
      roll_difficulty: 12

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Move fast and get out
        order: 1
        target_scene: null
        success_scene: the-fence__lockup-clean
        failure_scene: the-fence__lockup-cornered
        arrival_flavor: Back on the street with the box under your jacket. Priya doesn't know your name. Good.
        failure_arrival_flavor: A door opens at the wrong moment. A uniform, half-awake, holding a coffee.
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # LOCKUP CORNERED
  # -------------------------

  - key: the-fence__lockup-cornered
    scene_type: normal
    title: Lockup Cornered
    order: 60
    body: |
      A cop. Tired. End of shift. He hasn't raised the alarm yet —
      he's still deciding what he's looking at. You still have a
      way out of this if you move right.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Bluff — wrong room, wrong floor
        order: 1
        target_scene: the-fence__lockup-bluff
        success_scene: null
        failure_scene: null
        arrival_flavor: You keep it simple. Tired voice. Wrong floor, sorry, heading back up.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

      - label: Run
        order: 2
        target_scene: the-fence__lockup-run
        success_scene: null
        failure_scene: null
        arrival_flavor: You don't give him time to make up his mind.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # ROLL SCENE — LOCKUP BLUFF
  # -------------------------

  - key: the-fence__lockup-bluff
    scene_type: normal
    title: Lockup Bluff
    order: 70
    body: |
      Wrong room, wrong floor. You say it like you mean it.
      Like you're mildly inconvenienced, not running anything.

    roll:
      requires_roll: true
      roll_stat: charisma
      roll_difficulty: 12

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Hold the story
        order: 1
        target_scene: null
        success_scene: the-fence__lockup-clean
        failure_scene: the-fence__busted-again
        arrival_flavor: He points you back toward the stairwell. You thank him. Neither of you will remember this.
        failure_arrival_flavor: He reaches for his radio. That's that.
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # COMBAT SCENE — LOCKUP RUN
  # -------------------------

  - key: the-fence__lockup-run
    scene_type: combat
    title: Lockup Run
    order: 80
    body: |
      It goes loud. Not ideal in a police building. You move fast
      and hope the layout is as simple as Priya said.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []
    choices: []

    combat_encounter:
      enemy: precinct_officer
      victory_scene: the-fence__lockup-clean
      defeat_scene: the-fence__busted-again
      victory_arrival_flavor: Out a side door before the radio crackles. Two blocks, then walking pace.
      defeat_arrival_flavor: They put you down hard. Second arrest this week.

  # -------------------------
  # LOCKUP CLEAN
  # -------------------------

  - key: the-fence__lockup-clean
    scene_type: normal
    title: Lockup Clean
    order: 90
    body: |
      Priya cracks the box in exchange for her cut — she has the
      combination from the intake form. Inside: a dozen pieces,
      mixed cut, wrapped in cloth. Rings, a bracelet, something
      that might be a brooch. Nothing traceable on sight.

      Same destination as always. Marek. Ansel Street.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Head to Marek's
        order: 1
        target_scene: the-fence__marek
        success_scene: null
        failure_scene: null
        arrival_flavor: Same dry cleaner's. Same smell. Marek looks up this time.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # DUVALL
  # -------------------------

  - key: the-fence__duvall
    scene_type: normal
    title: Duvall
    order: 100
    body: |
      Duvall lives above a laundromat in a neighborhood that's given
      up pretending. He answers the door in an undershirt, mid-forties,
      the look of a man who's been waiting for something bad to happen
      and is almost relieved it finally has.

      You deliver the message. Physically. He doesn't fight back —
      he just takes it, which is almost worse.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 5
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Leave him with a warning
        order: 1
        target_scene: the-fence__duvall-done
        success_scene: null
        failure_scene: null
        arrival_flavor: He nods from the floor. Says he'll have it by Friday. You believe him.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

      - label: Make sure he remembers
        order: 2
        target_scene: the-fence__duvall-done
        success_scene: null
        failure_scene: null
        arrival_flavor: He'll remember. So will his neighbors.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # DUVALL LIGHT (negotiated variant)
  # -------------------------

  - key: the-fence__duvall-light
    scene_type: normal
    title: Duvall Light
    order: 110
    body: |
      Duvall is more cooperative when the ask is cash rather than
      pain. He counts it out slowly, hands it over, doesn't make
      eye contact. Three hundred. You keep fifty off the top per
      Marek's terms.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 50
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Take the money and go
        order: 1
        target_scene: the-fence__duvall-done
        success_scene: null
        failure_scene: null
        arrival_flavor: Clean. You didn't even have to raise your voice.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # DUVALL DONE — THE MEET
  # -------------------------

  - key: the-fence__duvall-done
    scene_type: normal
    title: Duvall Done
    order: 120
    body: |
      Back to Ansel Street. Marek nods when you walk in, folds his
      newspaper, leads you to the back room. You put the jewels on
      the table. He examines them one by one under a loupe, not
      rushing. Names a number. It's fair — fairer than you expected.

      He goes to the back to get the cash.

      He takes a long time.

      Then two men come through the side door instead.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Read the room before it closes
        order: 1
        target_scene: the-fence__double-cross
        success_scene: null
        failure_scene: null
        arrival_flavor: Something's wrong. You clock it a beat before it becomes a problem.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

      - label: Wait and see what they want
        order: 2
        target_scene: the-fence__taken
        success_scene: null
        failure_scene: null
        arrival_flavor: Too slow. By the time you move it's already done.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # ROLL SCENE — DOUBLE CROSS
  # -------------------------

  - key: the-fence__double-cross
    scene_type: normal
    title: Double Cross
    order: 130
    body: |
      The men aren't buyers. The jewelry is already in Marek's back
      pocket. This was always how it was going to go. You have maybe
      two seconds to change how it ends.

    roll:
      requires_roll: true
      roll_stat: intellect
      roll_difficulty: 13

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Move first
        order: 1
        target_scene: null
        success_scene: the-fence__flipped
        failure_scene: the-fence__fight-out
        arrival_flavor: You're already moving before they expect it. The room tips in your favor.
        failure_arrival_flavor: Too slow. One of them gets a hand on you.
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # COMBAT SCENE — FIGHT OUT
  # -------------------------

  - key: the-fence__fight-out
    scene_type: combat
    title: Fight Out
    order: 140
    body: |
      Two of Marek's men in a back room. The jewels are gone but
      you might still get out.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []
    choices: []

    combat_encounter:
      enemy: mareks_men
      victory_scene: the-fence__escaped
      defeat_scene: the-fence__taken
      victory_arrival_flavor: Both of them down. You're out the back before Marek hears it.
      defeat_arrival_flavor: They're better than you expected. The room goes dark.

  # -------------------------
  # VICTORY ENDING — FLIPPED
  # -------------------------

  - key: the-fence__flipped
    scene_type: ending
    title: Flipped
    order: 150
    body: |
      You move first. Marek's men aren't ready for that. It goes
      fast and ugly and then it's quiet and you're walking out with
      the jewels still in your pocket and Marek's cashbox under
      your arm. Marek is zip-tied to his own chair with a face
      full of regret.

      The dry cleaner's will be empty by morning. Marek will be
      a name people say carefully for a while.

      He's made an enemy. So have you. The difference is you
      saw it coming.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: victory

    arrival:
      cash_change: 400
      rep_change: 20
      heat_change: 10
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Back to the apartment
        order: 1
        target_scene: hub__apartment
        success_scene: null
        failure_scene: null
        arrival_flavor: The cashbox goes under the floorboard next to the jewels. Not bad for a week's work.
        failure_arrival_flavor: null
        set_flag_name: fence_victory
        clear_flag_name: null
        requirements: []

  # -------------------------
  # NEUTRAL ENDING — ESCAPED
  # -------------------------

  - key: the-fence__escaped
    scene_type: ending
    title: Escaped
    order: 160
    body: |
      Out the back door, empty-handed. The jewels are gone — Marek
      has them, and by tomorrow so will whoever he sells them to.
      But you got out, which is more than Marek planned for you.

      He'll know your name now. That cuts both ways. You're a
      problem he didn't finish, which makes you dangerous. It also
      makes you a target.

      You got out. That has to be enough for tonight.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: neutral

    arrival:
      cash_change: 0
      rep_change: 5
      heat_change: 15
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Back to the apartment
        order: 1
        target_scene: hub__apartment
        success_scene: null
        failure_scene: null
        arrival_flavor: You walk fast and don't look back. Marek's still out there. So are you.
        failure_arrival_flavor: null
        set_flag_name: fence_neutral
        clear_flag_name: null
        requirements: []

  # -------------------------
  # DEFEAT ENDING — TAKEN
  # -------------------------

  - key: the-fence__taken
    scene_type: ending
    title: Taken
    order: 170
    body: |
      Marek's men walk you out the back and relieve you of
      everything. The jewels, whatever cash you came in with,
      the leverage you thought you had. Marek doesn't even come
      out of the back room. He doesn't need to.

      They let you go. Sending a message is cheaper than a body.
      The message lands.

      You walk back out onto Ansel Street with empty pockets
      and a very clear understanding of where you stand.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: defeat

    arrival:
      cash_change: -100
      rep_change: -10
      heat_change: 5
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Back to the apartment
        order: 1
        target_scene: hub__apartment
        success_scene: null
        failure_scene: null
        arrival_flavor: Nothing to show for it. Marek has everything. You have a walk home.
        failure_arrival_flavor: null
        set_flag_name: fence_defeat
        clear_flag_name: null
        requirements: []

  # -------------------------
  # DEFEAT ENDING — BUSTED AGAIN
  # -------------------------

  - key: the-fence__busted-again
    scene_type: ending
    title: Busted Again
    order: 180
    body: |
      Second arrest in a week. The parole officer is definitely
      going to hear about this one. The box is back in evidence.
      Marek doesn't know your name.

      That's the only thing that went right.

      You sit in the holding cell and think about the particular
      sequence of decisions that led here. It's a short list.
      That's almost worse.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: defeat

    arrival:
      cash_change: -75
      rep_change: -15
      heat_change: 35
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Back to the apartment
        order: 1
        target_scene: hub__apartment
        success_scene: null
        failure_scene: null
        arrival_flavor: Released at six in the morning. The city is already going without you.
        failure_arrival_flavor: null
        set_flag_name: fence_defeat
        clear_flag_name: null
        requirements: []
