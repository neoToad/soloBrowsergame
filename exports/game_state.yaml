- key: harlan_muscle
  name: Harlan Street Muscle
  description: 'Dutch sends muscle, not lawyers. This is the muscle. Older than the
    Kings'' guys, quieter about it, less interested in the theatre of the thing. Has
    done this enough times that it''s just work.

    '
  max_hp: 30
  attack_modifier: 3
  defense: 12
  damage_min: 3
  damage_max: 8
- key: kings_lieutenant
  name: Kings Lieutenant
  description: 'One of several. The internal politics mean he''s always half-managing
    someone else''s problem as well as his own. Experienced, genuinely dangerous,
    and irritable about it.

    '
  max_hp: 38
  attack_modifier: 4
  defense: 13
  damage_min: 4
  damage_max: 10
- key: kings_soldier
  name: Kings Soldier
  description: 'Generational Westside. Knows every block, every exit, every face that
    doesn''t belong. The loose council structure means he''s not always sure who he''s
    answering to, which makes him edgy in a way that''s hard to predict.

    '
  max_hp: 28
  attack_modifier: 3
  defense: 11
  damage_min: 3
  damage_max: 8
