enemies:
- key: backstreet_boy
  name: Backstreet Boy
  description: "Craig's crew. More flash than discipline \u2014 chain visible, shoes\
    \ clean, genuinely believes the outfit carries weight. It doesn't. Still hits\
    \ hard enough that it doesn't matter.\n"
  max_hp: 22
  attack_modifier: 2
  defense: 10
  damage_min: 3
  damage_max: 7
- key: blues_officer
  name: Blues Officer
  description: "Cahill's people. Doesn't say anything incriminating. Doesn't need\
    \ to \u2014 the badge does the threatening. Trained, structured, and operating\
    \ with the full weight of the system behind him. The worst kind of opponent.\n"
  max_hp: 35
  attack_modifier: 4
  defense: 14
  damage_min: 4
  damage_max: 10
- key: bucco_associate
  name: Bucco Associate
  description: 'Old world structure means old world patience. He will wait for the
    right moment in a way that street crews genuinely can''t. Suit jacket. Doesn''t
    raise his voice. The calm is the threat.

    '
  max_hp: 32
  attack_modifier: 3
  defense: 13
  damage_min: 4
  damage_max: 9
- key: bucco_capo
  name: Bucco Capo
  description: "Been with the family long enough that Richie Bucco knows his children's\
    \ names. That's not warmth \u2014 that's depth of investment. Removing him is\
    \ a family matter now, not just a business one.\n"
  max_hp: 50
  attack_modifier: 5
  defense: 14
  damage_min: 5
  damage_max: 12
- key: corner_boy
