<div class="scene-card-header">
    <div class="scene-title" title="{{ scene.title }}">{{ scene.title }}</div>
    <span class="type-badge type-badge-{{ scene.scene_type }}">{{ scene.scene_type }}</span>
</div>
<div class="scene-key">{{ scene.key }}</div>
{% if scene.hub_exits %}
    <div class="hub-exit-list">
        {% for exit in scene.hub_exits %}
            <div class="hub-exit-item" title="{{ exit.choice_label }}">&#8617; {{ exit.hub_title }}</div>
        {% endfor %}
    </div>
{% endif %}
<div class="scene-card-footer">
    {% if scene.requires_roll %}
        <div class="roll-badge">ROLL</div>
    {% else %}
        <div></div>
    {% endif %}
    <div class="scene-card-actions">
        <button
            type="button"
            class="qb-card-button"
            hx-get="{% url 'admin:quest_builder_scene_panel' quest_id scene.id %}"
            hx-target="#panel"
            hx-swap="innerHTML">
            Edit
        </button>
        <button
            type="button"
            class="qb-card-button"
            hx-get="{% url 'admin:quest_builder_choice_panel_new' quest_id scene.id %}"
            hx-target="#panel"
            hx-swap="innerHTML">
            Add Choice
        </button>
    </div>
</div>
