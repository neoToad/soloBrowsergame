<div id="inventory-panel" {% if oob %}hx-swap-oob="true"{% endif %}>
    <p class="panel-label">[ STASH ]</p>
    {% if inventory %}
        {% for item_id, pi in inventory.items %}
            <div class="item-row">
                <span class="item-name">{{ pi.item.name }}</span>
                <div class="item-actions">
                    {% if pi.quantity > 1 %}
                        <span class="item-qty">x{{ pi.quantity }}</span>
                    {% endif %}
                    {% if pi.item.effect_type %}
                        <button class="item-use-btn"
                            hx-post="{% url 'use_item' pi.item.id %}"
                            hx-target="#scene-panel"
                            hx-swap="innerHTML"
                            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
                            USE
                        </button>
                    {% endif %}
                </div>
            </div>
        {% endfor %}
    {% else %}
        <p class="item-empty">Nothing on you.</p>
    {% endif %}
</div>
