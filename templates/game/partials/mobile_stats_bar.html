{% load game_filters %}
<div id="mobile-stats-bar" {% if oob %}hx-swap-oob="true"{% endif %}>
    <details id="mobile-stats-details" open>

        <summary class="mob-stats-summary">
            <span class="mob-stat mob-stat--composure">
                <span class="mob-stat-label">HP</span>
                <span class="mob-stat-value {{ stats.hp|hp_color_class:effective_stats.max_hp }}">{{ stats.hp }}/{{ effective_stats.max_hp }}</span>
            </span>
            <span class="mob-stat mob-stat--rank">
                <span class="mob-stat-label">RANK</span>
                <span class="mob-stat-value">{{ stats.level|rank_title }}</span>
            </span>
        </summary>

        <div class="mob-stats-extra">
            <span class="mob-stat mob-stat--clickable" onclick="document.getElementById('stat-modal-strength').showModal()">
                <span class="mob-stat-label">MUSCLE</span>
                <span class="mob-stat-value">
                    <button type="button" class="stat-trigger-btn">
                        {{ effective_stats.strength }}
                    </button>
                </span>
            </span>
            <span class="mob-stat mob-stat--clickable" onclick="document.getElementById('stat-modal-agility').showModal()">
                <span class="mob-stat-label">REFLEXES</span>
                <span class="mob-stat-value">
                    <button type="button" class="stat-trigger-btn">
                        {{ effective_stats.agility }}{% if stat_bonuses.agility %}<span class="stat-bonus">+{{ stat_bonuses.agility }}</span>{% endif %}
                    </button>
                </span>
            </span>
            <span class="mob-stat mob-stat--clickable" onclick="document.getElementById('stat-modal-intellect').showModal()">
                <span class="mob-stat-label">CUNNING</span>
                <span class="mob-stat-value">
                    <button type="button" class="stat-trigger-btn">
                        {{ effective_stats.intellect }}{% if stat_bonuses.intellect %}<span class="stat-bonus">+{{ stat_bonuses.intellect }}</span>{% endif %}
                    </button>
                </span>
            </span>
            <span class="mob-stat mob-stat--clickable" onclick="document.getElementById('stat-modal-charisma').showModal()">
                <span class="mob-stat-label">NERVE</span>
                <span class="mob-stat-value">
                    <button type="button" class="stat-trigger-btn">
                        {{ effective_stats.charisma }}{% if stat_bonuses.charisma %}<span class="stat-bonus">+{{ stat_bonuses.charisma }}</span>{% endif %}
                    </button>
                </span>
            </span>

        </div>

    </details>
</div>
