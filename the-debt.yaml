quest:
  key: the-debt
  title: The Debt
  description: >
    There was a note under the door. No name, just an address and a time.
    You know who it's from. You know what it means.
  arc: null
  arc_order: null
  is_repeatable: false
  hub_scenes:
    - hub__apartment
  entrance_scene: the-debt__summons
  requirements:
    - label: Must have been defeated by the fence
      logic: all
      conditions:
        - condition_type: quest_ending
          required_quest: the-fence
          required_ending_type: defeat
          flag_name: null
          stat_name: null
          stat_value: null
          required_item: null
          required_contact: null

scenes:

  # -------------------------
  # ENTRANCE SCENE
  # -------------------------

  - key: the-debt__summons
    scene_type: normal
    title: Summons
    order: 10
    body: |
      You didn't go looking for Marek. Marek found you. A note
      under the door — no name, just an address and a time. You
      know who it's from. You know what it means. Showing up is
      already an admission. Not showing up would be worse.

      The address is a bar on Fenwick Street called The Linden.
      Marek is in the back booth, alone, drinking something clear.
      He doesn't look like a man who's worried. He looks like a
      man who's already decided how this conversation ends.

      He tells you what you owe. Then he tells you how to pay it off.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Hear him out
        order: 1
        target_scene: the-debt__the-job
        success_scene: null
        failure_scene: null
        arrival_flavor: You sit down. You don't have a choice and both of you know it.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

      - label: Push back on the number
        order: 2
        target_scene: the-debt__negotiate
        success_scene: null
        failure_scene: null
        arrival_flavor: Marek listens with the patience of a man who finds this mildly entertaining.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # ROLL SCENE — NEGOTIATE
  # -------------------------

  - key: the-debt__negotiate
    scene_type: normal
    title: Negotiate
    order: 20
    body: |
      You contest the figure. Marek sets his glass down. The bar
      is quiet enough that this is a real conversation, which means
      it's also a real risk.

    roll:
      requires_roll: true
      roll_stat: charisma
      roll_difficulty: 12

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Make the case
        order: 1
        target_scene: null
        success_scene: the-debt__the-job
        failure_scene: the-debt__the-job
        arrival_flavor: He shaves the number. Not much. Enough to feel like a win that isn't.
        failure_arrival_flavor: He adds interest for the inconvenience.
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # THE JOB
  # -------------------------

  - key: the-debt__the-job
    scene_type: normal
    title: The Job
    order: 30
    body: |
      A man named Garrett runs a print shop on Ostler Street.
      On the surface it's legitimate. Underneath, Garrett has
      been producing forged documentation — IDs, titles, permits
      — and selling them through a network Marek used to be part
      of. Garrett cut Marek out six months ago and kept the network.

      Marek wants two things: the plates Garrett uses for the
      forgeries, and enough on Garrett personally to keep him
      quiet afterward. Marek wants leverage, not violence.
      For now.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Case the print shop first
        order: 1
        target_scene: the-debt__casing
        success_scene: null
        failure_scene: null
        arrival_flavor: You spend an afternoon across the street with a coffee.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

      - label: Go straight in
        order: 2
        target_scene: the-debt__the-shop
        success_scene: null
        failure_scene: null
        arrival_flavor: No preparation. Sometimes that's cleaner.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # CASING
  # -------------------------

  - key: the-debt__casing
    scene_type: normal
    title: Casing
    order: 40
    body: |
      Garrett runs the shop with one employee — a teenager who
      leaves at five. Garrett stays until seven, alone. There's
      a back entrance through the alley that doesn't get used
      much. The forging operation is in the basement — you can
      see the light through the pavement grate. There's a filing
      cabinet in the back office visible through the window.
      That's probably where the leverage is.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Go in after hours
        order: 1
        target_scene: the-debt__the-shop
        success_scene: null
        failure_scene: null
        arrival_flavor: Seven-fifteen. Garrett's light is still on in the back.
        failure_arrival_flavor: null
        set_flag_name: debt_cased
        clear_flag_name: null
        requirements: []

  # -------------------------
  # THE SHOP
  # -------------------------

  - key: the-debt__the-shop
    scene_type: normal
    title: The Shop
    order: 50
    body: |
      Inside the print shop. Ink smell and machinery. Award
      certificates on the wall, a customer counter, a tip jar.
      The legitimate front is convincing. The back room is where
      it changes — a door with a keypad. You need to get through it.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Crack the keypad
        order: 1
        target_scene: the-debt__keypad
        success_scene: null
        failure_scene: null
        arrival_flavor: Four digits. You try the year on the business license first.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

      - label: Find Garrett and make him open it
        order: 2
        target_scene: the-debt__garrett-confrontation
        success_scene: null
        failure_scene: null
        arrival_flavor: A sound from the back. Garrett's still here.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # ROLL SCENE — KEYPAD
  # -------------------------

  - key: the-debt__keypad
    scene_type: normal
    title: Keypad
    order: 60
    body: |
      Four digits. The business license on the wall has a year
      on it. People are predictable when they think nobody's
      watching.

    roll:
      requires_roll: true
      roll_stat: intellect
      roll_difficulty: 11

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Try it
        order: 1
        target_scene: null
        success_scene: the-debt__basement
        failure_scene: the-debt__garrett-confrontation
        arrival_flavor: It works. The door swings open.
        failure_arrival_flavor: Three wrong attempts and a new sound from upstairs. Garrett heard something.
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # GARRETT CONFRONTATION
  # -------------------------

  - key: the-debt__garrett-confrontation
    scene_type: normal
    title: Garrett Confrontation
    order: 70
    body: |
      Garrett is fiftyish, ink-stained, the kind of man who's
      spent decades being careful and knows when that's about
      to stop mattering. He's not aggressive — he's calculating.
      He looks at you the way people look at weather.

      He asks who sent you.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Tell him it's Marek
        order: 1
        target_scene: the-debt__garrett-knows
        success_scene: null
        failure_scene: null
        arrival_flavor: Something shifts in his face. Not fear. Recognition.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

      - label: Say nothing
        order: 2
        target_scene: the-debt__garrett-fight
        success_scene: null
        failure_scene: null
        arrival_flavor: He reaches for something under the counter.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # GARRETT KNOWS
  # -------------------------

  - key: the-debt__garrett-knows
    scene_type: normal
    title: Garrett Knows
    order: 80
    body: |
      Garrett sits down. Opens the back room himself. Pulls the
      plates out from under the press and sets them on the
      workbench. Then opens a drawer and puts a folder next to
      them. He says Marek already knows what's in it — this isn't
      new leverage, it's old leverage Marek lost access to when
      Garrett walked.

      Then he makes you an offer.

      He'll give you everything Marek wants. But he'll also give
      you something Marek doesn't know exists — a second folder.
      The real one. Something that doesn't just keep Garrett quiet.
      Something that would keep Marek quiet too. Permanently.

      He wants you to decide whose leash you want to be on.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Take both folders and the plates — decide later
        order: 1
        target_scene: the-debt__took-both
        success_scene: null
        failure_scene: null
        arrival_flavor: Garrett watches you weigh it up. He's been here before.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

      - label: Take Marek's folder and the plates — stay on task
        order: 2
        target_scene: the-debt__stay-on-task
        success_scene: null
        failure_scene: null
        arrival_flavor: Clean. You take what Marek asked for and leave the rest on the table.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

      - label: Take Garrett's folder only — flip on Marek
        order: 3
        target_scene: the-debt__flip
        success_scene: null
        failure_scene: null
        arrival_flavor: You leave the plates. Garrett nods. Says he'll consider the debt between you settled.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # ROLL SCENE — TOOK BOTH
  # -------------------------

  - key: the-debt__took-both
    scene_type: normal
    title: Took Both
    order: 90
    body: |
      You reach for both folders. Garrett's eyes narrow. He wants
      a commitment, not a maybe. He lets you know that.

    roll:
      requires_roll: true
      roll_stat: intellect
      roll_difficulty: 12

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Walk out with everything
        order: 1
        target_scene: null
        success_scene: the-debt__basement
        failure_scene: the-debt__garrett-fight
        arrival_flavor: He lets it go. You've got both folders and the plates and a head start.
        failure_arrival_flavor: Garrett calls your bluff. He wants a commitment, not a maybe.
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # BASEMENT
  # -------------------------

  - key: the-debt__basement
    scene_type: normal
    title: Basement
    order: 100
    body: |
      The basement is exactly what the casing suggested. Plates,
      chemicals, a professional setup that cost real money. You
      take the plates. There's also a locked filing cabinet —
      the leverage Marek wanted.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items:
      - item: forged_plates
        quantity: 1
        award_once: true

    scene_contacts: []

    choices:
      - label: Take the filing cabinet contents too
        order: 1
        target_scene: the-debt__back-to-marek
        success_scene: null
        failure_scene: null
        arrival_flavor: Garrett's private life, documented in receipts and photographs. Ugly stuff.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

      - label: Just take the plates
        order: 2
        target_scene: the-debt__back-to-marek
        success_scene: null
        failure_scene: null
        arrival_flavor: You've got what Marek asked for. The rest isn't your business.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # STAY ON TASK
  # -------------------------

  - key: the-debt__stay-on-task
    scene_type: normal
    title: Stay On Task
    order: 105
    body: |
      You take what Marek sent you for and leave Garrett's offer
      on the table. Clean. Uncomplicated. You're still on Marek's
      leash but you did the job right.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items:
      - item: forged_plates
        quantity: 1
        award_once: true

    scene_contacts: []

    choices:
      - label: Deliver to Marek
        order: 1
        target_scene: the-debt__back-to-marek
        success_scene: null
        failure_scene: null
        arrival_flavor: Garrett watches you go. He doesn't try to stop you.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # FLIP
  # -------------------------

  - key: the-debt__flip
    scene_type: normal
    title: Flip
    order: 107
    body: |
      Garrett says there's someone else who'd want to know what's
      in this folder. A name: Sable. She's been building a case
      against Marek for months. He gives you a way to reach her.
      Says the debt between you is settled.

      You walk out of the print shop with the folder and a name.
      The plates stay on the workbench.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Find Sable
        order: 1
        target_scene: the-debt__sable-meeting
        success_scene: null
        failure_scene: null
        arrival_flavor: She's not hard to find if you know what name to ask for.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # SABLE MEETING
  # -------------------------

  - key: the-debt__sable-meeting
    scene_type: normal
    title: Sable Meeting
    order: 115
    body: |
      Sable is exactly what Garrett described — careful, thorough,
      patient in a way that suggests she's been burned by impatience
      before. She looks at the folder for a long time without saying
      anything. Then she says it's enough. Not to take Marek apart
      completely — but enough to make him move, and moving men
      make mistakes.

      She wants to work together. She has pieces. You have pieces.
      Marek is the puzzle.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_contacts:
      - contact: sable
        action: gain
        award_once: true

    scene_items: []

    choices:
      - label: Agree
        order: 1
        target_scene: the-debt__allied
        success_scene: null
        failure_scene: null
        arrival_flavor: She nods. Doesn't shake your hand. You're already past that.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

      - label: Take her information and stay independent
        order: 2
        target_scene: the-debt__independent
        success_scene: null
        failure_scene: null
        arrival_flavor: She says to remember her name when it mattered. You will.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # COMBAT SCENE — GARRETT FIGHT
  # -------------------------

  - key: the-debt__garrett-fight
    scene_type: combat
    title: Garrett Fight
    order: 95
    body: |
      Garrett is not a fighter but he has a back room full of
      heavy equipment and the advantage of familiarity.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []
    choices: []

    combat_encounter:
      enemy: garrett
      victory_scene: the-debt__basement
      defeat_scene: the-debt__garrett-won
      victory_arrival_flavor: Garrett's on the floor. You step over him.
      defeat_arrival_flavor: He knows this room better than you do. That's what does it.

  # -------------------------
  # BACK TO MAREK
  # -------------------------

  - key: the-debt__back-to-marek
    scene_type: normal
    title: Back To Marek
    order: 120
    body: |
      Back to The Linden. Marek examines the plates, examines
      the folder if you brought it. Nods. Says the debt is cleared.
      Says maybe there's more work if you want it. The way he says
      it doesn't sound like an offer.

      You're off the leash — for now. But you did Marek's dirty
      work and you know it. And somewhere on Ostler Street, Garrett
      is thinking about what comes next.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: null

    arrival:
      cash_change: 0
      rep_change: 0
      heat_change: 0
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Walk away
        order: 1
        target_scene: the-debt__cleared
        success_scene: null
        failure_scene: null
        arrival_flavor: Marek watches you go. He doesn't say goodbye.
        failure_arrival_flavor: null
        set_flag_name: null
        clear_flag_name: null
        requirements: []

  # -------------------------
  # VICTORY ENDING — ALLIED
  # -------------------------

  - key: the-debt__allied
    scene_type: ending
    title: Allied
    order: 130
    body: |
      The debt to Marek is gone — he just doesn't know it yet.
      You and Sable have something better than cleared books.
      You have a plan. She keeps the folder safe. You stay loose.
      When the moment comes, you'll both know it.

      Marek thinks he won. That's fine. Let him think it a
      little longer.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: victory

    arrival:
      cash_change: 50
      rep_change: 20
      heat_change: -5
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Back to the apartment
        order: 1
        target_scene: hub__apartment
        success_scene: null
        failure_scene: null
        arrival_flavor: Sable will be in touch. For the first time in a while, you believe that's a good thing.
        failure_arrival_flavor: null
        set_flag_name: debt_victory
        clear_flag_name: null
        requirements: []

  # -------------------------
  # NEUTRAL ENDING — INDEPENDENT
  # -------------------------

  - key: the-debt__independent
    scene_type: ending
    title: Independent
    order: 140
    body: |
      You took Sable's information and kept your own counsel.
      She didn't argue — just said to remember her name when
      it mattered. The debt to Marek is cleared, technically.
      But you're holding something that could burn him, and
      he has no idea.

      That's a position. Not a comfortable one. But a position.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: neutral

    arrival:
      cash_change: 25
      rep_change: 10
      heat_change: 5
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Back to the apartment
        order: 1
        target_scene: hub__apartment
        success_scene: null
        failure_scene: null
        arrival_flavor: The folder goes somewhere safe. Marek doesn't know it exists. That's the whole advantage.
        failure_arrival_flavor: null
        set_flag_name: debt_neutral
        clear_flag_name: null
        requirements: []

  # -------------------------
  # NEUTRAL ENDING — CLEARED
  # -------------------------

  - key: the-debt__cleared
    scene_type: ending
    title: Cleared
    order: 150
    body: |
      Debt cleared. Job done. You did what Marek asked and now
      you're even — his word, for what that's worth. You walk
      out of The Linden and the city swallows you up.

      Garrett has the plates missing and leverage held over him.
      Marek has what he wanted. You have your freedom back,
      more or less.

      It doesn't sit clean. But it's done.

    roll:
      requires_roll: false
      roll_stat: null
      roll_difficulty: null

    ending:
      ending_type: neutral

    arrival:
      cash_change: 75
      rep_change: 5
      heat_change: 10
      consume_item: null
      receive_property: null
      lose_property: null

    scene_items: []
    scene_contacts: []

    choices:
      - label: Back to the apartment
        order: 1
        target_scene: hub__apartment
        success_scene: null
        failure_scene: null
        arrival_flavor: You breathe easier on the walk home. Not much. But some.
        failure_arrival_flavor: null
        set_flag_name: debt_neutral
        clear_flag_name: null
        requirements: []

  # -------------------------
  # DEFEAT ENDING — GARRETT WON
  # -------------------------

  - key: the-debt__garrett-won
    scene_type: ending
    title: Garrett Won
    order: 160
    body: |
      Garrett put you on the floor and called someone to come
      collect you. By the time you're back on the street, Marek
      knows the job went wrong. The debt stands. He'll be in touch.

      You walk back past the print shop on your way home. The
      lights are off. Garrett's already gone.

    roll:
